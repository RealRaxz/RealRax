<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#d60000,#ff4040);
min-height:100vh;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 6px 16px rgba(0,0,0,0.2);
}

textarea{
width:100%;
height:200px;
border-radius:6px;
padding:10px;
resize:none;
}

button{
padding:10px 16px;
border:none;
background:#d60000;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#d60000;
color:white;
padding:10px 20px;
border-radius:6px;
opacity:0;
transition:0.3s;
}

#toast.show{
opacity:1;
}

</style>
</head>

<body>

<div class="container">

<div class="box">

<h2 id="title"></h2>

<h3>📜 รายละเอียด</h3>

<p>
⚡ สคริปต์สำหรับเกม Roblox  
🚀 ช่วยให้เล่นเกมง่ายขึ้น  
🎮 มีระบบฟาร์มอัตโนมัติ  
🧩 ใช้งานง่ายมาก  
📱 รองรับ Executor ส่วนใหญ่
</p>

<h3>🛠 วิธีใช้งาน</h3>

<p>
1️⃣ เข้าเกม Roblox  
2️⃣ เปิด Executor  
3️⃣ กด Copy Script  
4️⃣ วาง Script  
5️⃣ กด Execute
</p>

<textarea id="code" readonly></textarea>

<br>

<button onclick="copy()">📋 Copy Script</button>
<button onclick="history.back()">⬅ Back</button>

</div>

</div>

<div id="toast">Script Copied</div>

<script>

const params=new URLSearchParams(window.location.search)

let id=params.get("id")||1

document.getElementById("title").innerText="Script "+id

document.getElementById("code").value="print('script "+id+"')"

function copy(){

navigator.clipboard.writeText(document.getElementById("code").value)

let t=document.getElementById("toast")

t.classList.add("show")

setTimeout(()=>{

t.classList.remove("show")

},2000)

}

</script>

</body>
</html>
