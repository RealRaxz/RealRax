<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(135deg,#ff3b3b,#d60000);
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.box{
background:white;
color:#333;
border-radius:12px;
padding:30px;
box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

textarea{
width:100%;
height:200px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
}

button{
background:#d60000;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.back{
display:inline-block;
margin-top:15px;
color:#d60000;
text-decoration:none;
font-weight:600;
}

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="container">

<div class="box">

<h2 id="title"></h2>

<h3>📄 รายละเอียด</h3>

<p>
⚡ Script สำหรับ Roblox  
🚀 ช่วย Auto Farm และระบบอัตโนมัติ  
🧠 ใช้งานง่าย  
📦 รองรับ Executor  
🎮 เพิ่มความสะดวกในการเล่น
</p>

<h3>🛠 วิธีใช้</h3>

<p>
1️⃣ เปิด Roblox  
2️⃣ เปิด Executor  
3️⃣ Copy Script  
4️⃣ วาง Script  
5️⃣ Execute
</p>

<textarea id="code" readonly></textarea>

<br>

<button onclick="copyScript()">📋 Copy Script</button>

<br>

<a href="index.html" class="back">⬅ กลับหน้าแรก</a>

</div>

</div>

<script>

const scripts={
1:"print('Auto Farm')",
2:"print('Auto Raid')",
3:"print('King Legacy')",
4:"print('Anime Fighters')",
5:"print('Pet Simulator')",
6:"print('Doors')",
7:"print('Fast Farm')",
8:"print('Anime Warriors')",
9:"print('Shindo Life')",
10:"print('Blade Ball')",
11:"print('Brookhaven')",
12:"print('Arsenal')"
}

const params=new URLSearchParams(window.location.search)

let id=params.get("id")||1

document.getElementById("title").innerText="Script "+id

document.getElementById("code").value=scripts[id]

function copyScript(){
navigator.clipboard.writeText(document.getElementById("code").value)
}

</script>

</body>
</html>
