<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#d60000,#ff4040);
}

.btn{
position:relative;
overflow:hidden;
background:#d60000;
color:white;
padding:10px 18px;
border-radius:6px;
border:none;
cursor:pointer;
transition:0.25s;
}

.btn:hover{
transform:translateY(-3px);
}

.btn:active{
transform:scale(0.95);
}

.btn::after{
content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
transition:0.6s;
}

.btn:hover::after{
left:100%;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
background:white;
border-radius:10px;
margin-top:50px;
}

textarea{
width:100%;
height:200px;
resize:none;
}

</style>

</head>

<body>

<div class="container">

<h2 id="title"></h2>

<textarea id="code" readonly></textarea>

<br><br>

<button class="btn" onclick="copyScript()">📋 Copy Script</button>

<br><br>

<a class="btn" href="index.html">⬅️ ย้อนกลับ</a>

</div>

<script>

const scripts={
1:"print('Script1')",
2:"print('Script2')",
3:"print('Script3')",
4:"print('Script4')",
5:"print('Script5')",
6:"print('Script6')",
7:"print('Script7')",
8:"print('Script8')",
9:"print('Script9')",
10:"print('Script10')",
11:"print('Script11')",
12:"print('Script12')",
13:"print('Script13')",
14:"print('Script14')",
15:"print('Script15')",
16:"print('Script16')",
17:"print('Script17')",
18:"print('Script18')",
19:"print('Script19')",
20:"print('Script20')"
}

const params=new URLSearchParams(window.location.search)

let id=params.get("id")||1

document.getElementById("title").innerText="Script "+id

document.getElementById("code").value=scripts[id]

function copyScript(){
navigator.clipboard.writeText(document.getElementById("code").value)
}

</script>

</body>
</html>
