<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#d60000,#ff4040);
}

.navbar{
position:sticky;
top:0;
background:#b80000;
padding:15px 40px;
color:white;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 8px 18px rgba(0,0,0,0.2);
}

textarea{
width:100%;
height:200px;
resize:none;
}

button{
background:#d60000;
color:white;
padding:12px 20px;
border:none;
border-radius:6px;
cursor:pointer;
}

.back{
margin-top:15px;
display:inline-block;
}

#toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#d60000;
color:white;
padding:12px 20px;
border-radius:6px;
opacity:0;
transition:0.3s;
}

#toast.show{
opacity:1;
}

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">🎄 RealRax Scripts</div>

<div class="container">

<div class="box">

<h2>📜 Script</h2>

<p>✨ รายละเอียด</p>
<p>
🎮 ใช้สำหรับ Roblox Auto Farm<br>
⚡ ช่วยฟาร์มเร็วขึ้น<br>
🧠 ใช้งานง่าย<br>
🔒 ปลอดภัยระดับหนึ่ง<br>
🚀 เพิ่มประสิทธิภาพการเล่น
</p>

<p>📌 วิธีใช้</p>
<p>
1️⃣ เปิด Roblox<br>
2️⃣ เปิด Executor<br>
3️⃣ กด Copy Script<br>
4️⃣ วางใน Executor<br>
5️⃣ กด Execute
</p>

<textarea id="code" readonly>print("Example Script")</textarea>

<br><br>

<button onclick="copy()">Copy Script</button>

<br>

<a class="back" href="index.html">⬅ กลับหน้าแรก</a>

</div>

</div>

<div id="toast">คัดลอก Script สำเร็จ</div>

<script>

function copy(){

navigator.clipboard.writeText(document.getElementById("code").value)

let t=document.getElementById("toast")

t.classList.add("show")

setTimeout(()=>{

t.classList.remove("show")

},2000)

}

</script>

</body>
</html>
