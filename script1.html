<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#d60000,#ff4040);
}

.navbar{
position:sticky;
top:0;
background:#b80000;
color:white;
padding:16px 30px;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.box{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

textarea{
width:100%;
height:200px;
border-radius:6px;
padding:10px;
resize:none;
}

button{
background:#d60000;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:translateY(-2px);
}

button:active{
transform:scale(0.95);
}

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">🎄 RealRax Scripts</div>

<div class="container">

<div class="box">

<h2>📜 Script</h2>

<p>
⚡ Script นี้ช่วยให้ผู้เล่น Roblox ฟาร์มได้เร็วขึ้น  
🔥 รองรับ Executor ส่วนใหญ่  
🎮 ใช้งานง่ายมาก  
⏱ ลดเวลาในการเล่นเกม  
🚀 เหมาะสำหรับผู้เล่นทุกระดับ
</p>

<h3>🛠 วิธีใช้</h3>

<p>
1️⃣ เข้าเกม Roblox ที่ต้องการ  
2️⃣ เปิด Executor  
3️⃣ กด Copy Script  
4️⃣ วาง Script ลงใน Executor  
5️⃣ กด Execute
</p>

<textarea readonly id="code">print("RealRax Script")</textarea>

<br>

<button onclick="copy()">Copy Script</button>
<button onclick="history.back()">⬅ ย้อนกลับ</button>

</div>

</div>

<script>

function copy(){

navigator.clipboard.writeText(
document.getElementById("code").value
)

alert("Copied!")

}

/* snow */

const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let snow=[]

for(let i=0;i<150;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
s:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

snow.forEach(f=>{

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()

f.y+=f.s

if(f.y>canvas.height){

f.y=0
f.x=Math.random()*canvas.width

}

})

}

setInterval(draw,30)

</script>

</body>
</html>
