<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(#d60000,#ff4040);
}

.navbar{
position:sticky;
top:0;
background:#b80000;
color:white;
padding:15px 40px;
}

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.box{
background:white;
border-radius:10px;
padding:30px;
box-shadow:0 10px 22px rgba(0,0,0,0.2);
}

textarea{
width:100%;
height:200px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
resize:none;
}

button{
background:#d60000;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
margin-top:10px;
cursor:pointer;
}

.back{
display:inline-block;
margin-top:15px;
color:#d60000;
text-decoration:none;
}

#toast{
position:fixed;
bottom:40px;
left:50%;
transform:translateX(-50%);
background:#d60000;
color:white;
padding:12px 22px;
border-radius:8px;
opacity:0;
transition:0.4s;
}

#toast.show{
opacity:1;
}

</style>

</head>

<body>

<div class="navbar">🎄 Copy Script</div>

<div class="container">

<div class="box">

<h2 id="title"></h2>

<h3>📄 รายละเอียด</h3>

<p>
⚡ Script นี้ช่วยให้เล่น Roblox ง่ายขึ้น  
🚀 มีระบบออโต้หลายอย่าง  
📦 ใช้งานกับ Executor ได้  
🧠 เหมาะกับมือใหม่  
🎮 เพิ่มความสะดวกในการเล่น
</p>

<h3>🛠 วิธีใช้</h3>

<p>
1️⃣ เปิด Roblox  
2️⃣ เปิด Executor  
3️⃣ กด Copy Script  
4️⃣ วางใน Executor  
5️⃣ กด Execute
</p>

<textarea id="code" readonly></textarea>

<br>

<button onclick="copyScript()">📋 Copy Script</button>

<br>

<a href="index.html" class="back">⬅ กลับหน้าแรก</a>

</div>

</div>

<div id="toast">คัดลอก Script สำเร็จ</div>

<script>

const scripts={

1:"print('Auto Farm')",
2:"print('Auto Raid')",
3:"print('King Legacy')",
4:"print('Anime Fighters')",
5:"print('Pet Simulator')",
6:"print('Doors')",
7:"print('Fast Farm')",
8:"print('Anime Warriors')",
9:"print('Shindo Life')",
10:"print('Blade Ball')",
11:"print('Brookhaven')",
12:"print('Arsenal')"

}

const params=new URLSearchParams(window.location.search)

let id=params.get("id")||1

document.getElementById("title").innerText="Script "+id

document.getElementById("code").value=scripts[id]

function copyScript(){

navigator.clipboard.writeText(document.getElementById("code").value)

let t=document.getElementById("toast")

t.classList.add("show")

setTimeout(()=>{

t.classList.remove("show")

},2000)

}

</script>

</body>
</html>
