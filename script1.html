<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff;
}

.container{
max-width:800px;
margin:100px auto;
padding:30px;
background:white;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,.2);
}

h1{
color:#d60000;
}

textarea{
width:100%;
height:180px;
border-radius:8px;
padding:10px;
resize:none;
border:2px solid #ff2d2d;
}

button{
margin-top:10px;
padding:10px 20px;
background:#ff2d2d;
border:none;
color:white;
font-weight:bold;
border-radius:8px;
cursor:pointer;
}

.back{
display:inline-block;
margin-top:10px;
color:#ff2d2d;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>📜 Copy Script</h1>

<p>
🔥 รายละเอียด  
สคริปต์นี้ใช้สำหรับ Roblox ช่วยให้เล่นเกมสะดวกขึ้น  
รองรับ Executor หลายตัว เช่น Delta  
สามารถใช้กับ Blox Fruits ได้  
อัปเดตตามแพตช์ล่าสุด  
ปลอดภัยและใช้งานง่าย
</p>

<p>
⚙️ วิธีใช้  
1. เปิด Roblox  
2. เปิด Executor  
3. วาง Script  
4. กด Execute  
5. สนุกกับฟังก์ชัน
</p>

<textarea id="script" readonly></textarea>

<button onclick="copy()">Copy Script</button>

<br>

<a class="back" href="index.html">⬅ กลับหน้าแรก</a>

</div>

<script>

const scripts={
1:"print('script1')",
2:"print('script2')",
3:"print('script3')",
4:"print('script4')",
5:"print('script5')",
6:"print('script6')",
7:"print('script7')",
8:"print('script8')",
9:"print('script9')",
10:"print('script10')",
11:"print('script11')",
12:"print('script12')",
13:"print('script13')",
14:"print('script14')",
15:"print('script15')",
16:"print('script16')",
17:"print('script17')",
18:"print('script18')",
19:"print('script19')",
20:"print('script20')"
}

let id=new URLSearchParams(location.search).get("id")

document.getElementById("script").value=scripts[id]

function copy(){

let text=document.getElementById("script")

text.select()

navigator.clipboard.writeText(text.value)

let msg=document.createElement("div")

msg.innerText="Copied!"

msg.style.position="fixed"
msg.style.bottom="30px"
msg.style.right="30px"
msg.style.background="red"
msg.style.color="white"
msg.style.padding="10px"
msg.style.borderRadius="8px"

document.body.appendChild(msg)

setTimeout(()=>msg.remove(),1500)

}

</script>

</body>
</html>
