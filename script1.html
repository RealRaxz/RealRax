<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:linear-gradient(#ff3c3c,#a10000);
min-height:100vh;
}

.box{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:12px;
margin-top:60px;
}

textarea{
width:100%;
height:200px;
}

.btn{
background:#d60000;
color:white;
padding:10px 16px;
border:none;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
transform:translateY(-4px);
}

.btn:active{
transform:scale(0.9);
}

</style>
</head>

<body>

<div class="box">

<h2 id="title"></h2>

<h3>📄 คำอธิบาย</h3>
<p id="desc"></p>

<h3>🛠 วิธีใช้</h3>

<p>
1 เปิด Roblox  
2 เปิด Executor  
3 Copy Script  
4 Paste ลง Executor  
5 กด Execute
</p>

<textarea id="code" readonly></textarea>

<br><br>

<button class="btn" onclick="copy()">Copy Script</button>

<a class="btn" href="download.html">Download Executor</a>

</div>

<script>

/* เพิ่ม script ตรงนี้ */

const scripts={

1:{
title:"Blox Fruits Auto Farm",
desc:"ฟาร์มเลเวลอัตโนมัติ",
code:"print('Auto Farm')"
},

2:{
title:"Blox Fruits Raid",
desc:"ลง Raid อัตโนมัติ",
code:"print('Auto Raid')"
},

3:{
title:"King Legacy",
desc:"ฟาร์มเงินอัตโนมัติ",
code:"print('King Legacy')"
},

4:{
title:"Anime Fighters",
desc:"Auto fight",
code:"print('Anime Fighters')"
},

5:{
title:"Pet Simulator",
desc:"Auto collect coins",
code:"print('Pet Sim')"
},

6:{
title:"Doors",
desc:"ESP ประตู",
code:"print('Doors')"
},

7:{
title:"Blade Ball",
desc:"Auto parry",
code:"print('Blade Ball')"
},

8:{
title:"Brookhaven",
desc:"Admin menu",
code:"print('Brookhaven')"
},

9:{
title:"Shindo Life",
desc:"Auto farm boss",
code:"print('Shindo')"
},

10:{
title:"Arsenal",
desc:"Aimbot",
code:"print('Arsenal')"
}

}

const params=new URLSearchParams(location.search)
let id=params.get("id")

let s=scripts[id]

document.getElementById("title").innerText=s.title
document.getElementById("desc").innerText=s.desc
document.getElementById("code").value=s.code

function copy(){

navigator.clipboard.writeText(s.code)
alert("Copied!")

}

</script>

</body>
</html>
