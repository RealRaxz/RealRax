<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="stylesheet" href="style.css">

<title>Copy Script</title>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">

<div>🎄 RealRax Scripts</div>

<div class="nav-links">

<a href="index.html">Home</a>

</div>

</div>

<div class="container">

<div class="script-box">

<h2>📜 Script</h2>

<p>

⚡ Script นี้ช่วยให้คุณใช้งานระบบอัตโนมัติใน Roblox  
🚀 ช่วยฟาร์มเร็วขึ้นและลดเวลาการเล่น  
🎮 รองรับ Executor หลายตัว  
🔧 ใช้งานง่ายเพียง Copy แล้ว Execute  
🛡 ใช้งานอย่างระมัดระวังในเกม

</p>

<textarea id="code" readonly>
print("example script")
</textarea>

<br><br>

<button onclick="copyScript()">📋 Copy Script</button>

<br><br>

<a href="index.html">🔙 ย้อนกลับ</a>

</div>

</div>

<div id="toast">คัดลอกสำเร็จ</div>

<script>

function copyScript(){

navigator.clipboard.writeText(document.getElementById("code").value)

let t=document.getElementById("toast")

t.classList.add("show")

setTimeout(()=>{t.classList.remove("show")},2000)

}

</script>

<script src="snow.js"></script>

</body>
</html>
