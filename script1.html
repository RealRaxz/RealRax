<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">

<div>🎄 RealRax Scripts</div>

<div class="navlinks">

<a href="index.html">Home</a>

<a href="download.html">Download</a>

</div>

</div>

<div class="box">

<h2 id="title"></h2>

<h3>📜 รายละเอียด</h3>

<p>
⚡ Script สำหรับเกม Roblox  
🚀 ช่วยฟาร์มอัตโนมัติ  
🎮 รองรับ Executor หลายตัว  
🔥 ใช้งานง่ายและรวดเร็ว  
📋 เพียง Copy แล้ว Execute
</p>

<h3>🛠 วิธีใช้</h3>

<p>
1️⃣ เปิดเกม Roblox  
2️⃣ เปิด Executor  
3️⃣ กด Copy Script  
4️⃣ วาง Script  
5️⃣ กด Execute
</p>

<textarea id="code" readonly></textarea>

<br><br>

<button onclick="copyScript()">📋 Copy Script</button>

<button onclick="history.back()">🔙 Back</button>

</div>

<div id="toast">คัดลอก Script สำเร็จ</div>

<script>

const scripts={
1:"print('Script1')",
2:"print('Script2')",
3:"print('Script3')",
4:"print('Script4')",
5:"print('Script5')",
6:"print('Script6')",
7:"print('Script7')",
8:"print('Script8')"
}

const params=new URLSearchParams(window.location.search)

let id=params.get("id")||1

document.getElementById("title").innerText="Script "+id

document.getElementById("code").value=scripts[id]

function copyScript(){

navigator.clipboard.writeText(document.getElementById("code").value)

let t=document.getElementById("toast")

t.classList.add("show")

setTimeout(()=>{

t.classList.remove("show")

},2000)

}

</script>

<script src="snow.js"></script>

</body>
</html>
