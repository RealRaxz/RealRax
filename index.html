<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Hub</title>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#f4f4f4;
}

/* HERO */

.hero{
background:linear-gradient(90deg,#ff2e2e,#b30000);
padding:60px 20px;
text-align:center;
color:white;
position:relative;
overflow:hidden;
}

.search-box{

margin-top:20px;

}

.search-box input{

padding:12px 18px;
width:280px;
border-radius:8px;
border:none;
outline:none;

}

/* CARD GRID */

.container{

max-width:1200px;
margin:auto;
padding:40px 20px;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;

}

.card{

background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:.25s;

}

.card:hover{

transform:translateY(-6px);

}

.card img{

width:100%;
height:150px;
object-fit:cover;

}

.card-content{

padding:18px;

}

.card-title{

font-weight:bold;
margin-bottom:10px;

}

/* BUTTON */

.btn{

background:#e60000;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
transition:.15s;

}

.btn:hover{

transform:translateY(-3px);
box-shadow:0 5px 10px rgba(0,0,0,0.25);

}

.btn:active{

transform:scale(.92);

}

/* BADGE */

.badge{

position:absolute;
top:10px;
left:10px;
background:red;
color:white;
font-size:12px;
padding:4px 8px;
border-radius:6px;

}

.card-wrap{

position:relative;

}

/* PAGINATION */

.pagination{

text-align:center;
margin-top:40px;

}

.page-btn{

background:#e60000;
color:white;
border:none;
margin:4px;
padding:10px 14px;
border-radius:6px;
cursor:pointer;
transition:.15s;

}

.page-btn:hover{

transform:translateY(-3px);

}

.page-btn:active{

transform:scale(.9);

}

.active{

background:#800000;

}

</style>

</head>

<body>

<div class="hero">

<h1>Roblox Script Hub</h1>

<div class="search-box">

<input type="text" id="search" placeholder="Search Script...">

</div>

</div>

<div class="container">

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>

/* SCRIPT DATA */

let scripts=[

{
title:"Blox Fruits Auto Farm",
img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",
tag:"HOT"
},

{
title:"Blox Fruits Auto Raid",
img:"https://picsum.photos/400/200?1",
tag:"NEW"
},

{
title:"King Legacy Script",
img:"https://picsum.photos/400/200?2"
},

{
title:"Anime Fighters Script",
img:"https://picsum.photos/400/200?3",
tag:"HOT"
},

{
title:"Pet Simulator Script",
img:"https://picsum.photos/400/200?4"
},

{
title:"Doors Script",
img:"https://picsum.photos/400/200?5",
tag:"NEW"
},

{
title:"Shindo Life Script",
img:"https://picsum.photos/400/200?6"
},

{
title:"Blade Ball Script",
img:"https://picsum.photos/400/200?7"
},

{
title:"Brookhaven Script",
img:"https://picsum.photos/400/200?8"
},

{
title:"Arsenal Script",
img:"https://picsum.photos/400/200?9"
},

{
title:"Anime Warriors Script",
img:"https://picsum.photos/400/200?10"
},

{
title:"Blox Fruits Fast Farm",
img:"https://picsum.photos/400/200?11"
}

]

/* ใหม่สุดอยู่บน */

scripts.reverse()

let currentPage=1
let perPage=8

const grid=document.getElementById("grid")
const pagination=document.getElementById("pagination")

function display(){

grid.innerHTML=""

let start=(currentPage-1)*perPage
let end=start+perPage

let pageItems=scripts.slice(start,end)

pageItems.forEach((s,i)=>{

let id=start+i+1

grid.innerHTML+=`

<div class="card">

<div class="card-wrap">

${s.tag?`<div class="badge">${s.tag}</div>`:""}

<img src="${s.img}">

</div>

<div class="card-content">

<div class="card-title">${s.title}</div>

<button class="btn" onclick="openScript(${id})">

Get Script

</button>

</div>

</div>

`

})

renderPagination()

}

function renderPagination(){

pagination.innerHTML=""

let pages=Math.ceil(scripts.length/perPage)

pagination.innerHTML+=`

<button class="page-btn" onclick="prevPage()">◀</button>

`

for(let i=1;i<=pages;i++){

pagination.innerHTML+=`

<button class="page-btn ${i==currentPage?"active":""}"

onclick="goPage(${i})">

${i}

</button>

`

}

pagination.innerHTML+=`

<button class="page-btn" onclick="nextPage()">▶</button>

`

}

function goPage(p){

currentPage=p
display()

}

function prevPage(){

if(currentPage>1){

currentPage--
display()

}

}

function nextPage(){

let pages=Math.ceil(scripts.length/perPage)

if(currentPage<pages){

currentPage++
display()

}

}

function openScript(id){

window.location="script1.html?id="+id

}

/* SEARCH */

document.getElementById("search").addEventListener("input",function(){

let value=this.value.toLowerCase()

scripts=scripts.filter(s=>s.title.toLowerCase().includes(value))

currentPage=1

display()

})

display()

</script>

</body>
</html>
