<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Christmas Scripts</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:Arial;
background:#ffffff;
color:#333;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
background:#d60000;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
position:sticky;
top:0;
z-index:10;
}

.logo{
font-size:22px;
font-weight:bold;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
font-weight:bold;
}

/* HERO */

.hero{
background:linear-gradient(180deg,#d60000,#ff3b3b);
color:white;
text-align:center;
padding:90px 20px;
}

.hero h1{
font-size:42px;
margin:0;
}

.hero p{
margin-top:10px;
opacity:0.9;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

/* CARD */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card button{
background:#d60000;
border:none;
color:white;
padding:10px 18px;
margin:15px;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* PAGINATION */

.pagination{
text-align:center;
margin-top:40px;
}

.pagination button{
padding:10px 15px;
margin:5px;
border:none;
background:#d60000;
color:white;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

/* FOOTER */

.footer{
background:#d60000;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}

/* SNOW CANVAS */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:1;
}

/* RESPONSIVE */

@media(max-width:600px){

.hero h1{
font-size:30px;
}

.navbar{
padding:12px 20px;
}

}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">

<div class="logo">🎄 Christmas Scripts</div>

<div>
<a href="#">Home</a>
<a href="#">Scripts</a>
<a href="#">About</a>
</div>

</div>


<div class="hero">

<h1>Latest Scripts</h1>

<p>Free Roblox Scripts Collection</p>

</div>


<div class="container">

<div id="scripts" class="grid"></div>

<div class="pagination">

<button onclick="page(1)">1</button>
<button onclick="page(2)">2</button>
<button onclick="page(3)">3</button>

</div>

</div>


<div class="footer">

© 2026 Christmas Scripts

</div>


<script>

/* SCRIPT DATA */

const data=[

{title:"Blox Fruits Auto Farm",img:"https://picsum.photos/400/200?1"},
{title:"Blox Fruits Auto Raid",img:"https://picsum.photos/400/200?2"},
{title:"King Legacy Script",img:"https://picsum.photos/400/200?3"},
{title:"Anime Fighters Script",img:"https://picsum.photos/400/200?4"},
{title:"Pet Simulator Script",img:"https://picsum.photos/400/200?5"},
{title:"Doors Script",img:"https://picsum.photos/400/200?6"},
{title:"Blade Ball Script",img:"https://picsum.photos/400/200?7"},
{title:"Adopt Me Script",img:"https://picsum.photos/400/200?8"},
{title:"Arsenal Script",img:"https://picsum.photos/400/200?9"}

];

/* PAGINATION */

function page(num){

const container=document.getElementById("scripts");

container.innerHTML="";

let start=(num-1)*3;
let end=start+3;

let items=data.slice(start,end);

items.forEach(script=>{

container.innerHTML+=`

<div class="card">

<img src="${script.img}">

<h3>${script.title}</h3>

<button>Get Script</button>

</div>

`;

});

}

page(1);

/* REALISTIC SNOW */

const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let snowflakes=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

window.addEventListener("resize",resize);

resize();

for(let i=0;i<150;i++){

snowflakes.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
d:Math.random()*1

});

}

function drawSnow(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.beginPath();

for(let i=0;i<snowflakes.length;i++){

let f=snowflakes[i];

ctx.moveTo(f.x,f.y);

ctx.arc(f.x,f.y,f.r,0,Math.PI*2,true);

}

ctx.fill();

moveSnow();

}

let angle=0;

function moveSnow(){

angle+=0.01;

for(let i=0;i<snowflakes.length;i++){

let f=snowflakes[i];

f.y+=Math.cos(angle+f.d)+1+f.r/2;

f.x+=Math.sin(angle)*2;

if(f.x>canvas.width||f.x<0||f.y>canvas.height){

snowflakes[i]={

x:Math.random()*canvas.width,
y:-10,
r:f.r,
d:f.d

};

}

}

}

setInterval(drawSnow,33);

</script>

</body>
</html>
