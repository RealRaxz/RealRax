<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Galaxy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#030712;
color:white;
overflow-x:hidden;
}

/* BLUE PARTICLES BACKGROUND */

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:200%;
pointer-events:none;
z-index:-1;

background-image:
radial-gradient(2px 2px at 5% 10%, #38bdf8, transparent),
radial-gradient(2px 2px at 15% 30%, #38bdf8, transparent),
radial-gradient(2px 2px at 25% 80%, #38bdf8, transparent),
radial-gradient(2px 2px at 35% 60%, #38bdf8, transparent),
radial-gradient(2px 2px at 45% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 55% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 65% 40%, #38bdf8, transparent),
radial-gradient(2px 2px at 75% 10%, #38bdf8, transparent),
radial-gradient(2px 2px at 85% 50%, #38bdf8, transparent),
radial-gradient(2px 2px at 95% 80%, #38bdf8, transparent),
radial-gradient(2px 2px at 10% 90%, #38bdf8, transparent),
radial-gradient(2px 2px at 20% 50%, #38bdf8, transparent),
radial-gradient(2px 2px at 30% 10%, #38bdf8, transparent),
radial-gradient(2px 2px at 40% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 50% 40%, #38bdf8, transparent),
radial-gradient(2px 2px at 60% 85%, #38bdf8, transparent),
radial-gradient(2px 2px at 70% 60%, #38bdf8, transparent),
radial-gradient(2px 2px at 80% 25%, #38bdf8, transparent),
radial-gradient(2px 2px at 90% 45%, #38bdf8, transparent),
radial-gradient(2px 2px at 98% 15%, #38bdf8, transparent);

animation:particleMove 40s linear infinite;
}

@keyframes particleMove{
0%{transform:translateY(0);}
100%{transform:translateY(-50%);}
}

/* HEADER */

header{
padding:25px;
font-size:28px;
font-weight:bold;
text-align:center;
color:#38bdf8;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
}

.card{
background:#0b1220;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #0ea5e9;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
padding:12px;
color:#38bdf8;
font-size:16px;
}

</style>
</head>

<body>

<div class="particles"></div>

<header>Script Galaxy</header>

<div class="container">

<div class="grid">

<!-- 10 SCRIPT BOX -->

<div class="card" onclick="openScript('script1')">
<img src="https://picsum.photos/400/200?1">
<h3>Script 1</h3>
</div>

<div class="card" onclick="openScript('script2')">
<img src="https://picsum.photos/400/200?2">
<h3>Script 2</h3>
</div>

<div class="card" onclick="openScript('script3')">
<img src="https://picsum.photos/400/200?3">
<h3>Script 3</h3>
</div>

<div class="card" onclick="openScript('script4')">
<img src="https://picsum.photos/400/200?4">
<h3>Script 4</h3>
</div>

<div class="card" onclick="openScript('script5')">
<img src="https://picsum.photos/400/200?5">
<h3>Script 5</h3>
</div>

<div class="card" onclick="openScript('script6')">
<img src="https://picsum.photos/400/200?6">
<h3>Script 6</h3>
</div>

<div class="card" onclick="openScript('script7')">
<img src="https://picsum.photos/400/200?7">
<h3>Script 7</h3>
</div>

<div class="card" onclick="openScript('script8')">
<img src="https://picsum.photos/400/200?8">
<h3>Script 8</h3>
</div>

<div class="card" onclick="openScript('script9')">
<img src="https://picsum.photos/400/200?9">
<h3>Script 9</h3>
</div>

<div class="card" onclick="openScript('script10')">
<img src="https://picsum.photos/400/200?10">
<h3>Script 10</h3>
</div>

</div>
</div>

<script>

function openScript(name){
window.location.href="scriptpage.html?script="+name
}

</script>

</body>
</html>
