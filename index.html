<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>RealRax Scripts</title>

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* NAVBAR */

.navbar{
background:#d60000;
color:white;
padding:14px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.navlinks a{
color:white;
margin:0 10px;
text-decoration:none;
font-size:14px;
}

/* HERO */

.hero{
position:relative;
background:linear-gradient(#d60000,#ff4040);
text-align:center;
color:white;
padding:70px 20px;
overflow:hidden;
}

.hero h1{margin:0;font-size:38px;z-index:2;position:relative}
.hero p{z-index:2;position:relative}

#snowHero{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:25px;
}

/* SEARCH */

.search{text-align:center;margin-bottom:25px}

.search input{
width:320px;
max-width:90%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* CATEGORY */

.categories{text-align:center;margin-bottom:20px}

.categories button{
background:#d60000;
border:none;
color:white;
margin:4px;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

@media(max-width:900px){
.grid{grid-template-columns:repeat(2,1fr)}
}

@media(max-width:600px){
.grid{grid-template-columns:1fr}
}

/* CARD */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 12px 28px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{margin:15px}

.status{
margin-left:15px;
font-size:13px;
color:green;
}

.card a{
display:inline-block;
margin:15px;
background:#d60000;
color:white;
padding:10px 15px;
border-radius:6px;
text-decoration:none;
}

/* TRENDING */

.sectionTitle{
font-size:20px;
margin:20px 0;
}

/* PAGINATION */

.pagination{
text-align:center;
margin-top:35px;
}

.pagination button{
background:#1f78b4;
color:white;
border:none;
margin:3px;
padding:7px 12px;
cursor:pointer;
}

.pagination button.active{
background:#999;
}

/* FOOTER */

footer{
background:#222;
color:#ccc;
text-align:center;
padding:30px;
margin-top:50px;
}

</style>

</head>

<body>

<div class="navbar">

<div><b>🎄 RealRax Scripts</b></div>

<div class="navlinks">
<a href="#">Home</a>
<a href="#">Scripts</a>
<a href="#">About</a>
<a href="#">Contact</a>
</div>

</div>

<div class="hero">

<canvas id="snowHero"></canvas>

<h1>RealRax Script Library</h1>
<p>Free Roblox Scripts</p>

</div>

<div class="container">

<div class="sectionTitle">🔥 Trending Scripts</div>

<div id="trending" class="grid"></div>

<br>

<div class="search">
<input id="search" placeholder="🔎 Search Script">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('blox')">Blox Fruits</button>
<button onclick="filterCategory('anime')">Anime</button>
<button onclick="filterCategory('sim')">Simulator</button>
</div>

<div id="grid" class="grid"></div>

<div id="pagination" class="pagination"></div>

</div>

<footer>

RealRax Scripts<br>
Free Roblox Script Library<br>
© 2026

</footer>

<script>

/* DATABASE */

const scripts=[
{title:"Blox Fruits Auto Farm",cat:"blox",img:"https://picsum.photos/400/200?1"},
{title:"Blox Fruits Auto Raid",cat:"blox",img:"https://picsum.photos/400/200?2"},
{title:"Anime Fighters Script",cat:"anime",img:"https://picsum.photos/400/200?3"},
{title:"King Legacy Script",cat:"anime",img:"https://picsum.photos/400/200?4"},
{title:"Pet Simulator Script",cat:"sim",img:"https://picsum.photos/400/200?5"},
{title:"Doors Script",cat:"sim",img:"https://picsum.photos/400/200?6"},
{title:"Auto Level",cat:"blox",img:"https://picsum.photos/400/200?7"},
{title:"Fruit Finder",cat:"blox",img:"https://picsum.photos/400/200?8"},
{title:"Anime Souls",cat:"anime",img:"https://picsum.photos/400/200?9"},
{title:"Anime Defense",cat:"anime",img:"https://picsum.photos/400/200?10"},
{title:"Simulator X",cat:"sim",img:"https://picsum.photos/400/200?11"},
{title:"Doors ESP",cat:"sim",img:"https://picsum.photos/400/200?12"}
]

/* TRENDING */

const trending=document.getElementById("trending")

scripts.slice(0,3).forEach((s,i)=>{

trending.innerHTML+=`
<div class="card">
<img src="${s.img}">
<h3>${s.title}</h3>
<div class="status">🟢 Working</div>
<a href="script1.html?id=${i+1}">📜 Get Script</a>
</div>
`

})

/* PAGINATION */

let currentPage=1
let perPage=6
let filtered=[...scripts]

function render(){

let start=(currentPage-1)*perPage
let end=start+perPage

let pageData=filtered.slice(start,end)

const grid=document.getElementById("grid")

grid.innerHTML=""

pageData.forEach((s,i)=>{

grid.innerHTML+=`

<div class="card">

<img src="${s.img}">

<h3>${s.title}</h3>

<div class="status">🟢 Working</div>

<a href="script1.html?id=${scripts.indexOf(s)+1}">
📜 Get Script
</a>

</div>

`

})

renderPagination()

}

function renderPagination(){

let pages=Math.ceil(filtered.length/perPage)

let html=""

html+=`<button onclick="goPage(1)">«</button>`
html+=`<button onclick="goPage(${Math.max(1,currentPage-1)})"><</button>`

for(let i=1;i<=pages;i++){
html+=`<button class="${i==currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`
}

html+=`<button onclick="goPage(${Math.min(pages,currentPage+1)})">></button>`
html+=`<button onclick="goPage(${pages})">»</button>`

document.getElementById("pagination").innerHTML=html

}

function goPage(p){
currentPage=p
render()
}

/* SEARCH */

document.getElementById("search").addEventListener("input",e=>{

let text=e.target.value.toLowerCase()

filtered=scripts.filter(s=>s.title.toLowerCase().includes(text))

currentPage=1
render()

})

function filterCategory(cat){

if(cat=="all") filtered=[...scripts]
else filtered=scripts.filter(s=>s.cat==cat)

currentPage=1
render()

}

render()

/* HERO SNOW */

const canvas=document.getElementById("snowHero")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=canvas.offsetWidth
canvas.height=canvas.offsetHeight
}

resize()
window.addEventListener("resize",resize)

let snow=[]

for(let i=0;i<120;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

snow.forEach(f=>{

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()

f.y+=f.speed

if(f.y>canvas.height){
f.y=0
f.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
