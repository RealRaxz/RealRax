<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RealRax Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
}

/* navbar */

.navbar{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:rgba(214,0,0,0.8);
backdrop-filter:blur(8px);
color:white;
z-index:1000;
}

.navlinks a{
margin-left:20px;
color:white;
text-decoration:none;
font-weight:bold;
}

/* hero */

.hero{
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:70px 20px;
}

/* search */

.search{
text-align:center;
margin:30px;
}

.search input{
padding:12px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

/* grid */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card a{
display:inline-block;
background:#d60000;
color:white;
padding:10px 18px;
margin:15px;
border-radius:6px;
text-decoration:none;
}

/* badge */

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
font-size:12px;
padding:4px 10px;
border-radius:5px;
}

/* pagination */

.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
padding:8px 14px;
margin:5px;
border:none;
background:#d60000;
color:white;
border-radius:5px;
cursor:pointer;
}

/* snow */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">
<div>🎄 RealRax Scripts</div>

<div class="navlinks">
<a href="index.html">Home</a>
<a href="download.html">Download</a>
<a href="https://www.youtube.com/@RealRaxScripts" target="_blank">YouTube</a>
</div>

</div>

<div class="hero">
<h1>Latest Scripts</h1>
<p>Free Roblox Scripts</p>
</div>

<div class="search">
<input id="search" placeholder="Search script...">
</div>

<div class="container">

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>

/* scripts list */

let scripts=[]

for(let i=1;i<=30;i++){

scripts.push({

title:"Script "+i,
img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",
badge: i%5==0 ? "HOT" : "",
id:i

})

}

let page=1
const perPage=8

function render(){

const search=document.getElementById("search").value.toLowerCase()

let filtered=scripts.filter(s=>s.title.toLowerCase().includes(search))

let start=(page-1)*perPage

let items=filtered.slice(start,start+perPage)

let grid=document.getElementById("grid")

grid.innerHTML=""

items.forEach(s=>{

grid.innerHTML+=`

<div class="card">

${s.badge ? `<div class="badge">${s.badge}</div>`:""}

<img src="${s.img}">

<h3>${s.title}</h3>

<a href="script1.html?id=${s.id}">Get Script</a>

</div>

`

})

renderPagination(filtered.length)

}

function renderPagination(total){

let pages=Math.ceil(total/perPage)

let html=""

for(let i=1;i<=pages;i++){

html+=`<button onclick="go(${i})">${i}</button>`

}

document.getElementById("pagination").innerHTML=html

}

function go(p){

page=p

render()

}

document.getElementById("search").addEventListener("input",()=>{

page=1

render()

})

render()

/* snow */

const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

let snow=[]

function resize(){

canvas.width=window.innerWidth
canvas.height=window.innerHeight

}

resize()

window.addEventListener("resize",resize)

for(let i=0;i<150;i++){

snow.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

ctx.beginPath()

snow.forEach(f=>{

ctx.moveTo(f.x,f.y)

ctx.arc(f.x,f.y,f.r,0,Math.PI*2)

})

ctx.fill()

snow.forEach(f=>{

f.y+=f.speed

if(f.y>canvas.height){

f.y=0
f.x=Math.random()*canvas.width

}

})

}

setInterval(draw,30)

</script>

</body>
</html>
