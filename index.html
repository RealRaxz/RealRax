<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealRax Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:#fff;
}

.navbar{
position:sticky;
top:0;
background:#d60000;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 30px;
z-index:1000;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.navbar a{
color:white;
text-decoration:none;
margin-left:15px;
padding:6px 12px;
border-radius:6px;
transition:0.3s;
}

.navbar a:hover{
background:white;
color:#d60000;
}

.hero{
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:60px 20px;
}

.search{
text-align:center;
margin:25px;
}

.search input{
padding:10px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:22px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 6px 16px rgba(0,0,0,0.15);
overflow:hidden;
position:relative;
transition:0.25s;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:12px;
}

.card a{
display:inline-block;
margin:12px;
padding:8px 14px;
background:#d60000;
color:white;
text-decoration:none;
border-radius:6px;
transition:0.2s;
}

.card a:hover{
background:#a80000;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:3px 9px;
border-radius:4px;
font-size:12px;
}

.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
padding:7px 12px;
margin:4px;
border:none;
background:#d60000;
color:white;
border-radius:5px;
cursor:pointer;
}

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">
<div>🎄 RealRax Scripts</div>

<div>
<a href="index.html">Home</a>
<a href="download.html">Download</a>
<a href="https://www.youtube.com/@RealRaxScripts" target="_blank">YouTube</a>
</div>

</div>

<div class="hero">
<h1>Latest Scripts</h1>
<p>Free Roblox Scripts</p>
</div>

<div class="search">
<input id="search" placeholder="Search script...">
</div>

<div class="container">

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>

/* generate 30 scripts */

let scripts=[]

for(let i=1;i<=30;i++){

scripts.push({
title:"Blox Fruits Script "+i,
img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",
badge:i<4?"HOT":(i<7?"NEW":""),
id:i
})

}

let page=1
let perPage=8

function render(){

let search=document.getElementById("search").value.toLowerCase()

let filtered=scripts.filter(s=>s.title.toLowerCase().includes(search))

let start=(page-1)*perPage
let items=filtered.slice(start,start+perPage)

let grid=document.getElementById("grid")

grid.innerHTML=""

items.forEach(s=>{

grid.innerHTML+=`

<div class="card">

${s.badge?`<div class="badge">${s.badge}</div>`:""}

<img src="${s.img}">

<h3>${s.title}</h3>

<a href="script1.html?id=${s.id}">Get Script</a>

</div>

`

})

pagination(filtered.length)

}

function pagination(total){

let pages=Math.ceil(total/perPage)

let html=""

for(let i=1;i<=pages;i++){

html+=`<button onclick="go(${i})">${i}</button>`

}

document.getElementById("pagination").innerHTML=html

}

function go(p){
page=p
render()
}

document.getElementById("search").addEventListener("input",()=>{

page=1
render()

})

render()

/* snow */

const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

let snow=[]

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()

for(let i=0;i<160;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
s:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.beginPath()

snow.forEach(f=>{

ctx.moveTo(f.x,f.y)
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)

})

ctx.fill()

snow.forEach(f=>{

f.y+=f.s

if(f.y>canvas.height){

f.y=0
f.x=Math.random()*canvas.width

}

})

}

setInterval(draw,30)

</script>

</body>
</html>
