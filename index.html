<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RealRax Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

.navbar{
background:#d60000;
color:white;
padding:16px 40px;
font-size:22px;
font-weight:bold;
}

/* HERO */

.hero{
position:relative;
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:80px 20px;
overflow:hidden;
}

.hero h1{
margin:0;
font-size:42px;
position:relative;
z-index:2;
}

.hero p{
margin-top:10px;
font-size:18px;
position:relative;
z-index:2;
}

#snowHero{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
z-index:1;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{
width:320px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* CATEGORY */

.categories{
text-align:center;
margin-bottom:25px;
}

.categories button{
margin:5px;
padding:8px 14px;
border:none;
background:#d60000;
color:white;
border-radius:6px;
cursor:pointer;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

/* CARD */

.card{
background:white;
border-radius:10px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 12px 28px rgba(0,0,0,0.2);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.status{
margin-left:15px;
color:green;
font-size:14px;
}

.card a{
display:inline-block;
margin:15px;
background:#d60000;
color:white;
padding:10px 16px;
border-radius:6px;
text-decoration:none;
}

/* PAGINATION */

.pagination{
text-align:center;
margin-top:40px;
}

.pagination button{
margin:4px;
padding:8px 12px;
border:none;
background:#d60000;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">
🎄 RealRax Scripts
</div>

<div class="hero">

<canvas id="snowHero"></canvas>

<h1>RealRax Script Library</h1>
<p>Free Roblox Scripts</p>

</div>

<div class="container">

<h2>🔥 Trending Scripts</h2>

<div id="trending" class="grid"></div>

<br><br>

<div class="search">
<input id="search" placeholder="🔎 Search Script">
</div>

<div class="categories">
<button onclick="filterCategory('all')">All</button>
<button onclick="filterCategory('blox')">Blox Fruits</button>
<button onclick="filterCategory('anime')">Anime</button>
<button onclick="filterCategory('sim')">Simulator</button>
</div>

<div id="grid" class="grid"></div>

<div id="pagination" class="pagination"></div>

</div>

<script>

/* SCRIPT DATABASE */

const scripts=[

{title:"New Ultimate Farm Script",cat:"blox",img:"https://picsum.photos/400/200?21"},
{title:"Auto Mastery Script",cat:"blox",img:"https://picsum.photos/400/200?22"},
{title:"Auto Quest Script",cat:"blox",img:"https://picsum.photos/400/200?23"},
{title:"Auto Boss Farm",cat:"blox",img:"https://picsum.photos/400/200?24"},
{title:"Fast Level Script",cat:"blox",img:"https://picsum.photos/400/200?25"},
{title:"Auto Dungeon Script",cat:"anime",img:"https://picsum.photos/400/200?26"},
{title:"Auto Gem Farm",cat:"anime",img:"https://picsum.photos/400/200?27"},
{title:"Auto Damage Script",cat:"anime",img:"https://picsum.photos/400/200?28"},
{title:"Auto Click Script",cat:"sim",img:"https://picsum.photos/400/200?29"},
{title:"Auto Rebirth Script",cat:"sim",img:"https://picsum.photos/400/200?30"},
{title:"Auto Hatch Script",cat:"sim",img:"https://picsum.photos/400/200?31"},
{title:"Auto Collect Script",cat:"sim",img:"https://picsum.photos/400/200?32"},

{title:"Blox Fruits Auto Farm",cat:"blox",img:"https://picsum.photos/400/200?1"},
{title:"Blox Fruits Auto Raid",cat:"blox",img:"https://picsum.photos/400/200?2"},
{title:"Anime Fighters Script",cat:"anime",img:"https://picsum.photos/400/200?3"},
{title:"King Legacy Script",cat:"anime",img:"https://picsum.photos/400/200?4"},
{title:"Pet Simulator Script",cat:"sim",img:"https://picsum.photos/400/200?5"},
{title:"Doors Script",cat:"sim",img:"https://picsum.photos/400/200?6"}

]

/* TRENDING */

const trending=document.getElementById("trending")

scripts.slice(0,3).forEach((s,i)=>{

trending.innerHTML+=`

<div class="card">
<img src="${s.img}">
<h3>${s.title}</h3>
<div class="status">🟢 Working</div>
<a href="script1.html?id=${i+1}">📜 Get Script</a>
</div>

`

})

/* PAGINATION SYSTEM */

let currentPage=1
let perPage=6
let filtered=[...scripts]

function render(){

let start=(currentPage-1)*perPage
let end=start+perPage

let pageData=filtered.slice(start,end)

let grid=document.getElementById("grid")

grid.innerHTML=""

pageData.forEach((s)=>{

grid.innerHTML+=`

<div class="card">
<img src="${s.img}">
<h3>${s.title}</h3>
<div class="status">🟢 Working</div>
<a href="script1.html?id=${scripts.indexOf(s)+1}">📜 Get Script</a>
</div>

`

})

renderPagination()

}

function renderPagination(){

let pages=Math.ceil(filtered.length/perPage)

let html=""

for(let i=1;i<=pages;i++){

html+=`<button onclick="goPage(${i})">${i}</button>`

}

document.getElementById("pagination").innerHTML=html

}

function goPage(p){
currentPage=p
render()
}

/* SEARCH */

document.getElementById("search").addEventListener("input",e=>{

let text=e.target.value.toLowerCase()

filtered=scripts.filter(s=>s.title.toLowerCase().includes(text))

currentPage=1
render()

})

/* CATEGORY */

function filterCategory(cat){

if(cat=="all"){
filtered=[...scripts]
}else{
filtered=scripts.filter(s=>s.cat==cat)
}

currentPage=1
render()

}

render()

</script>

</body>
</html>
