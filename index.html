<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealRax Scripts</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#fff;
color:#333;
overflow-x:hidden;
}

/* NAVBAR */

nav{
position:sticky;
top:0;
background:white;
border-bottom:2px solid #eee;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
z-index:1000;
}

nav h1{
color:#e60023;
}

nav a{
text-decoration:none;
margin-left:20px;
color:#333;
font-weight:bold;
position:relative;
transition:.3s;
}

nav a:hover{
transform:translateY(-3px);
}

/* HERO */

.hero{
text-align:center;
padding:80px 20px;
background:linear-gradient(#fff,#ffeaea);
}

.hero h2{
font-size:40px;
color:#e60023;
}

.hero p{
margin-top:10px;
color:#555;
}

/* GRID */

.grid{
max-width:1200px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
padding:40px 20px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 20px rgba(0,0,0,.08);
transition:.3s;
position:relative;
}

.card:hover{
transform:translateY(-8px);
}

.card img{
width:100%;
display:block;
}

.card h3{
padding:15px;
}

/* BUTTON */

.btn{
display:block;
margin:10px 15px 20px;
padding:12px;
background:#e60023;
color:white;
text-align:center;
border-radius:8px;
text-decoration:none;
font-weight:bold;
position:relative;
overflow:hidden;
}

.btn:after{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
transition:.6s;
}

.btn:hover:after{
left:100%;
}

.btn:hover{
transform:translateY(-2px);
}

/* BADGE */

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:5px 10px;
font-size:12px;
border-radius:20px;
}

/* SNOW */

.snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:9999;
}

</style>
</head>

<body>

<div class="snow" id="snow"></div>

<nav>
<h1>RealRax</h1>
<div>
<a href="#">Scripts</a>
<a href="download.html">Download</a>
<a href="https://www.youtube.com/@RealRaxScripts" target="_blank">YouTube</a>
</div>
</nav>

<section class="hero">
<h2>Latest Scripts</h2>
<p>Roblox Script Collection</p>
</section>

<section class="grid" id="grid"></section>

<script>

/* SCRIPT DATA (เพิ่มตรงนี้) */

const scripts=[

{title:"Script 1",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",badge:"NEW",id:1},
{title:"Script 2",img:"https://picsum.photos/400/200?2",badge:"HOT",id:2},
{title:"Script 3",img:"https://picsum.photos/400/200?3",badge:"",id:3},
{title:"Script 4",img:"https://picsum.photos/400/200?4",badge:"",id:4},
{title:"Script 5",img:"https://picsum.photos/400/200?5",badge:"",id:5},
{title:"Script 6",img:"https://picsum.photos/400/200?6",badge:"",id:6},
{title:"Script 7",img:"https://picsum.photos/400/200?7",badge:"",id:7},
{title:"Script 8",img:"https://picsum.photos/400/200?8",badge:"",id:8},
{title:"Script 9",img:"https://picsum.photos/400/200?9",badge:"",id:9},
{title:"Script 10",img:"https://picsum.photos/400/200?10",badge:"",id:10},
{title:"Script 11",img:"https://picsum.photos/400/200?11",badge:"",id:11},
{title:"Script 12",img:"https://picsum.photos/400/200?12",badge:"",id:12},
{title:"Script 13",img:"https://picsum.photos/400/200?13",badge:"",id:13},
{title:"Script 14",img:"https://picsum.photos/400/200?14",badge:"",id:14},
{title:"Script 15",img:"https://picsum.photos/400/200?15",badge:"",id:15},
{title:"Script 16",img:"https://picsum.photos/400/200?16",badge:"",id:16},
{title:"Script 17",img:"https://picsum.photos/400/200?17",badge:"",id:17},
{title:"Script 18",img:"https://picsum.photos/400/200?18",badge:"",id:18},
{title:"Script 19",img:"https://picsum.photos/400/200?19",badge:"",id:19},
{title:"Script 20",img:"https://picsum.photos/400/200?20",badge:"",id:20}

]

let perLoad=8
let current=0

function load(){

let grid=document.getElementById("grid")

for(let i=current;i<current+perLoad;i++){

if(!scripts[i]) return

let s=scripts[i]

grid.innerHTML+=`

<div class="card">

${s.badge?`<div class="badge">${s.badge}</div>`:""}

<img src="${s.img}">

<h3>${s.title}</h3>

<a class="btn" href="script1.html?id=${s.id}">
Copy Script
</a>

</div>

`

}

current+=perLoad

}

load()

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){

load()

}

})

/* SNOW */

const snow=document.getElementById("snow")

for(let i=0;i<50;i++){

let s=document.createElement("div")

s.style.position="absolute"
s.style.top="-10px"
s.style.left=Math.random()*100+"%"
s.style.width="5px"
s.style.height="5px"
s.style.background="white"
s.style.borderRadius="50%"
s.style.opacity=Math.random()

let fall=5+Math.random()*10

s.animate([

{transform:"translateY(0)"},
{transform:"translateY(110vh)"}

],{

duration:fall*1000,
iterations:Infinity

})

snow.appendChild(s)

}

</script>

</body>
</html>
