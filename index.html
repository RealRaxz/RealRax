<script>

/* DEFAULT THUMB */

const defaultThumb="https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"

/* DATABASE */

const scripts=[

{title:"Blox Fruits Auto Farm",cat:"blox",thumb:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Blox Fruits Auto Raid",cat:"blox",thumb:"https://img.youtube.com/vi/NxcjNO1i2vw/maxresdefault.jpg"},
{title:"Anime Fighters Script",cat:"anime",thumb:"https://img.youtube.com/vi/-lCf-dBK1cs/maxresdefault.jpg"},
{title:"King Legacy Script",cat:"anime"},
{title:"Pet Simulator Script",cat:"sim"},
{title:"Doors Script",cat:"sim"},

{title:"Blox Fruits Auto Level",cat:"blox"},
{title:"Blox Fruits Auto Quest",cat:"blox"},
{title:"Anime Souls Script",cat:"anime"},
{title:"Anime Warriors Script",cat:"anime"},
{title:"Pet Simulator Auto Farm",cat:"sim"},
{title:"Pet Simulator Dupe",cat:"sim"}

]

scripts.reverse()

/* TRENDING */

let trending=document.getElementById("trending")

scripts.slice(0,3).forEach((s,i)=>{

let thumb=s.thumb || defaultThumb

trending.innerHTML+=`

<div class="card">

<img src="${thumb}">

<h3>${s.title}</h3>

<div class="status">🟢 Working</div>

<button onclick="openPage(${scripts.indexOf(s)+1})">
📜 Get Script
</button>

</div>
`

})

/* PAGINATION */

let perPage=8
let currentPage=1
let filtered=[...scripts]

function render(){

let start=(currentPage-1)*perPage
let end=start+perPage

let pageData=filtered.slice(start,end)

let grid=document.getElementById("scripts")
grid.innerHTML=""

pageData.forEach(s=>{

let thumb=s.thumb || defaultThumb

grid.innerHTML+=`

<div class="card">

<img src="${thumb}">

<h3>${s.title}</h3>

<div class="status">🟢 Working</div>

<button onclick="openPage(${scripts.indexOf(s)+1})">
📜 Get Script
</button>

</div>

`

})

renderPagination()

}

function renderPagination(){

let pages=Math.ceil(filtered.length/perPage)

let html=""

html+=`<button onclick="goPage(1)">«</button>`
html+=`<button onclick="goPage(${currentPage-1})">‹</button>`

let start=Math.max(1,currentPage-3)
let end=Math.min(pages,currentPage+3)

for(let i=start;i<=end;i++){

html+=`<button class="${i==currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`

}

html+=`<button onclick="goPage(${currentPage+1})">›</button>`
html+=`<button onclick="goPage(${pages})">»</button>`

document.getElementById("pagination").innerHTML=html

}

function goPage(p){

let pages=Math.ceil(filtered.length/perPage)

if(p<1)p=1
if(p>pages)p=pages

currentPage=p
render()

}

document.getElementById("search").addEventListener("input",e=>{

let t=e.target.value.toLowerCase()

filtered=scripts.filter(s=>s.title.toLowerCase().includes(t))

currentPage=1

render()

})

function filterCategory(cat){

if(cat=="all"){
filtered=[...scripts]
}else{
filtered=scripts.filter(s=>s.cat==cat)
}

currentPage=1
render()

}

render()

/* HERO SNOW */

const canvas=document.getElementById("snowHero")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=canvas.offsetWidth
canvas.height=canvas.offsetHeight
}

resize()
window.addEventListener("resize",resize)

let snow=[]

for(let i=0;i<120;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

snow.forEach(f=>{

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()

f.y+=f.speed

if(f.y>canvas.height){
f.y=0
f.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

<style>

<div id="gateOverlay">
  <div id="gateBox">

    <div id="title">🔒 Unlock</div>
    <div id="sub">Complete steps</div>

    <button id="btn1" class="btn primary">Watch Ads</button>
    <button id="btn2" class="btn secondary lock">Like & Star</button>

    <div class="bar">
      <div id="fill" class="fill"></div>
    </div>
    <div id="percent" class="percent">0%</div>

    <button id="enterBtn">Locked</button>

  </div>
</div>

<script>
const overlay=document.getElementById("gateOverlay");
const b1=document.getElementById("btn1");
const b2=document.getElementById("btn2");
const fill=document.getElementById("fill");
const percent=document.getElementById("percent");
const enterBtn=document.getElementById("enterBtn");

requestAnimationFrame(()=>overlay.classList.add("show"));

let step=0;
let busy=false;

/* verify */
function verify(cb){
  if(busy)return;
  busy=true;

  let start=Date.now();
  let left=false;

  function blur(){left=true}
  function focus(){
    let t=Date.now()-start;

    if(left && t>2000){
      cleanup();
      busy=false;
      cb();
    }else{
      start=Date.now();
      left=false;
    }
  }

  function cleanup(){
    removeEventListener("blur",blur);
    removeEventListener("focus",focus);
  }

  addEventListener("blur",blur);
  addEventListener("focus",focus);

  window.open("https://example.com","_blank");
}

/* step1 */
b1.onclick=()=>{
  verify(()=>{
    step++;
    b1.classList.add("success");
    b1.textContent="Done";
    b2.classList.remove("lock");
  });
};

/* step2 */
b2.onclick=()=>{
  if(step<1)return;
  verify(()=>{
    step++;
    b2.classList.add("success");
    b2.textContent="Done";
    startProgress();
  });
};

/* progress */
function startProgress(){
  let p=0;

  let interval=setInterval(()=>{
    p+=1;

    fill.style.width=p+"%";
    percent.textContent=p+"%";

    if(p>=100){
      clearInterval(interval);
      enterBtn.classList.add("active");
      enterBtn.textContent="Enter Website";
    }
  },40);
}

/* enter */
enterBtn.onclick=()=>{
  if(!enterBtn.classList.contains("active"))return;
  overlay.remove();
};
</script>
