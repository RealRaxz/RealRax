<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* PARTICLES */

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:200%;
z-index:-1;

background-image:
radial-gradient(2px 2px at 5% 10%, #38bdf8, transparent),
radial-gradient(2px 2px at 15% 40%, #38bdf8, transparent),
radial-gradient(2px 2px at 25% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 35% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 45% 60%, #38bdf8, transparent),
radial-gradient(2px 2px at 55% 80%, #38bdf8, transparent),
radial-gradient(2px 2px at 65% 30%, #38bdf8, transparent),
radial-gradient(2px 2px at 75% 50%, #38bdf8, transparent),
radial-gradient(2px 2px at 85% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 95% 20%, #38bdf8, transparent);

animation:move 35s linear infinite;
}

@keyframes move{
0%{transform:translateY(0);}
100%{transform:translateY(-50%);}
}

/* HEADER */

header{
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:25px;
}

.search input{
padding:10px;
width:260px;
background:#0f172a;
border:none;
color:white;
border-radius:6px;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#0f172a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #38bdf8;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:14px;
color:#38bdf8;
}

.top{
color:#facc15;
padding-left:10px;
font-size:13px;
}

</style>
</head>

<body>

<div class="particles"></div>

<header>RealRax Script Hub</header>

<div class="container">

<div class="search">
<input id="search" placeholder="Search Script..." onkeyup="searchScript()">
</div>

<div class="grid" id="videos"></div>

</div>

<script>

let channelID="UCQpsD3OgICNaiyGaVeiC5BQ"
let page=0
let allVideos=[]

async function loadChannel(){

let url="https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id="+channelID

let res=await fetch(url)
let data=await res.json()

if(!data.items){
console.log("โหลดคลิปไม่ได้")
return
}

allVideos=data.items

loadVideos()

}

loadChannel()

function loadVideos(){

let grid=document.getElementById("videos")

for(let i=page;i<page+10 && i<allVideos.length;i++){

let video=allVideos[i]

let id=video.link.split("v=")[1].split("&")[0]

let card=document.createElement("div")
card.className="card"
card.onclick=()=>openScript(id)

card.innerHTML=`

${i==0?'<div class="top">⭐ Top Script</div>':''}

<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">

<h3>${video.title}</h3>

`

grid.appendChild(card)

}

page+=10

}

/* INFINITE SCROLL */

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){

loadVideos()

}

})

function openScript(id){

window.location.href="scriptpage.html?video="+id

}

function searchScript(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(input)?"block":"none"

})

}

</script>

</body>
</html>
