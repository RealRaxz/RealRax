<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Christmas Scripts</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:white;
color:#333;
}

/* NAVBAR */

.navbar{
background:#d60000;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
}

/* HERO */

.hero{
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:70px 20px;
}

.hero h1{
margin:0;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* CARD */

.card{
background:white;
border-radius:10px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
overflow:hidden;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card button{
background:#d60000;
border:none;
color:white;
padding:10px 18px;
margin:15px;
border-radius:6px;
cursor:pointer;
}

/* PAGINATION */

.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
padding:10px 14px;
margin:5px;
border:none;
background:#d60000;
color:white;
border-radius:6px;
cursor:pointer;
}

/* COPY PAGE */

.copyPage{
display:none;
padding:40px;
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:200px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* SNOW */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* RESPONSIVE */

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">

<div class="logo">🎄 Christmas Scripts</div>

</div>


<div id="home">

<div class="hero">

<h1>Latest Scripts</h1>

<p>Free Roblox Scripts</p>

</div>


<div class="container">

<div id="scripts" class="grid"></div>

<div class="pagination">

<button onclick="page(1)">1</button>
<button onclick="page(2)">2</button>
<button onclick="page(3)">3</button>

</div>

</div>

</div>


<!-- COPY PAGE -->

<div id="copyPage" class="copyPage">

<h2>Copy Script</h2>

<textarea id="scriptText"></textarea>

<br><br>

<button onclick="copyScript()">Copy Script</button>

<button onclick="goHome()">Back</button>

</div>


<script>

/* DATA */

const data=[

{title:"Blox Fruits Auto Farm",img:"https://picsum.photos/400/200?1",code:"print('Auto Farm')"},
{title:"Blox Fruits Auto Raid",img:"https://picsum.photos/400/200?2",code:"print('Auto Raid')"},
{title:"King Legacy Script",img:"https://picsum.photos/400/200?3",code:"print('King Legacy')"},
{title:"Anime Fighters Script",img:"https://picsum.photos/400/200?4",code:"print('Anime Fighters')"},
{title:"Pet Simulator Script",img:"https://picsum.photos/400/200?5",code:"print('Pet Simulator')"},
{title:"Doors Script",img:"https://picsum.photos/400/200?6",code:"print('Doors Script')"},

{title:"Blade Ball Script",img:"https://picsum.photos/400/200?7",code:"print('Blade Ball')"},
{title:"Adopt Me Script",img:"https://picsum.photos/400/200?8",code:"print('Adopt Me')"},
{title:"Arsenal Script",img:"https://picsum.photos/400/200?9",code:"print('Arsenal')"},
{title:"Brookhaven Script",img:"https://picsum.photos/400/200?10",code:"print('Brookhaven')"},
{title:"Tower Defense Script",img:"https://picsum.photos/400/200?11",code:"print('Tower Defense')"},
{title:"MM2 Script",img:"https://picsum.photos/400/200?12",code:"print('MM2')"}

];


/* PAGE SYSTEM */

function page(num){

let container=document.getElementById("scripts");

container.innerHTML="";

let start=(num-1)*6;
let end=start+6;

let items=data.slice(start,end);

items.forEach(script=>{

container.innerHTML+=`

<div class="card">

<img src="${script.img}">

<h3>${script.title}</h3>

<button onclick="openCopy(\`${script.code}\`)">Get Script</button>

</div>

`;

});

}

page(1);


/* COPY PAGE */

function openCopy(code){

document.getElementById("home").style.display="none";
document.getElementById("copyPage").style.display="block";

document.getElementById("scriptText").value=code;

}

function goHome(){

document.getElementById("copyPage").style.display="none";
document.getElementById("home").style.display="block";

}

function copyScript(){

let text=document.getElementById("scriptText");

text.select();

document.execCommand("copy");

alert("Script Copied");

}


/* SNOW FALL DOWN */

const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let snow=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

window.addEventListener("resize",resize);
resize();

for(let i=0;i<200;i++){

snow.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

ctx.beginPath();

snow.forEach(f=>{

ctx.moveTo(f.x,f.y);

ctx.arc(f.x,f.y,f.r,0,Math.PI*2);

});

ctx.fill();

snow.forEach(f=>{

f.y+=f.speed;

if(f.y>canvas.height){

f.y=0;
f.x=Math.random()*canvas.width;

}

});

}

setInterval(draw,30);

</script>

</body>
</html>
