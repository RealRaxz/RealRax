<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* particle */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* header */

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#38bdf8;
font-weight:bold;
}

/* search */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{

padding:12px;
width:260px;
border:none;
border-radius:8px;
background:#0f172a;
color:white;
outline:none;
border:1px solid rgba(56,189,248,0.15);

}

.search input:focus{

border-color:#38bdf8;
box-shadow:0 0 10px rgba(56,189,248,0.4);

}

/* grid */

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
max-width:1000px;
margin:auto;

}

/* card */

.card{

position:relative;
background:linear-gradient(145deg,#0f172a,#020617);
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
border:1px solid rgba(56,189,248,0.15);
box-shadow:0 0 15px rgba(0,0,0,0.4);

}

.card:hover{

transform:translateY(-6px) scale(1.03);
border-color:#38bdf8;
box-shadow:0 0 18px rgba(56,189,248,0.35);

}

.card img{

width:100%;
height:140px;
object-fit:cover;

}

.card-title{

padding:12px;
font-size:14px;
text-align:center;
color:#7dd3fc;
font-weight:500;
letter-spacing:0.3px;

}

.card:hover .card-title{

color:#38bdf8;

}

/* TOP badge */

.top{

position:absolute;
top:10px;
left:10px;
background:#38bdf8;
color:#020617;
font-size:11px;
padding:3px 8px;
border-radius:6px;
font-weight:bold;

}

/* mobile */

@media(max-width:800px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="header">
RealRax Script Hub
</div>

<div class="search">
<input id="search" placeholder="🔎 Search Script">
</div>

<div class="grid" id="grid">

<a href="scriptpage.html?script=script1" class="card">
<div class="top">TOP</div>
<img src="https://i.ytimg.com/vi/dQw4w9WgXcQ/hqdefault.jpg">
<div class="card-title">Script 1</div>
</a>

<a href="scriptpage.html?script=script2" class="card">
<div class="top">TOP</div>
<img src="https://i.ytimg.com/vi/3JZ_D3ELwOQ/hqdefault.jpg">
<div class="card-title">Script 2</div>
</a>

<a href="scriptpage.html?script=script3" class="card">
<img src="https://i.ytimg.com/vi/L_jWHffIx5E/hqdefault.jpg">

</div>

<script>

/* search system */

const search=document.getElementById("search")
const cards=document.querySelectorAll(".card")

search.addEventListener("keyup",function(){

let value=this.value.toLowerCase()

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

if(text.includes(value)){
card.style.display=""
}else{
card.style.display="none"
}

})

})

/* particles */

const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let particles=[]

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+1,
speed:Math.random()*0.4+0.1

})

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#38bdf8"

particles.forEach(p=>{

ctx.beginPath()
ctx.arc(p.x,p.y,p.size,0,Math.PI*2)
ctx.fill()

p.y-=p.speed

if(p.y<0){

p.y=canvas.height
p.x=Math.random()*canvas.width

}

})

requestAnimationFrame(animate)

}

animate()

</script>

</body>
</html>
