/* NAVBAR */

.navbar{
position:sticky;
top:0;
z-index:999;
display:flex;
align-items:center;
justify-content:space-between;
margin:16px;
padding:14px 22px;
border-radius:18px;
background:linear-gradient(180deg,#0b1220,#070f1c);
border:1px solid rgba(255,255,255,0.08);
}

.nav-left{
display:flex;
align-items:center;
gap:12px;
}

.nav-logo{
width:38px;
height:38px;
border-radius:50%;
}

.nav-text{
display:flex;
flex-direction:column;
}

.nav-title{
font-weight:700;
font-size:16px;
}

.nav-status{
font-size:11px;
color:#22c55e;
display:flex;
align-items:center;
gap:6px;
}

.status-dot{
width:7px;
height:7px;
background:#22c55e;
border-radius:50%;
box-shadow:0 0 8px #22c55e;
}

.nav-right{
display:flex;
gap:12px;
}

.nav-btn{
padding:10px 18px;
border-radius:12px;
font-size:14px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.08);
background:#0f172a;
color:white;
text-decoration:none;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.title{
font-size:36px;
font-weight:bold;
color:#38bdf8;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{
width:320px;
max-width:90%;
padding:12px;
border-radius:8px;
border:1px solid #ffffff;
background:#020617;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
transition:opacity 0.25s ease;
}

/* CARD */

.card-item{
position:relative;
}

.card{
background:#0f172a;
border:1px solid #ffffff;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-title{
padding:12px;
font-size:15px;
color:#e2e8f0;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#f59e0b;
color:black;
font-size:12px;
padding:4px 8px;
border-radius:6px;
font-weight:bold;
}

/* PAGINATION */

.pagination{
text-align:center;
margin:40px 0;
}

/* BUTTON */

.page-btn{
display:inline-block;
margin:4px;
padding:10px 16px;
border-radius:10px;

background:#0ea5e9;
color:white;

cursor:pointer;
font-weight:bold;

border:1px solid rgba(255,255,255,0.15);

transition:0.25s;
}

.page-btn:hover{
background:#0284c7;
transform:translateY(-2px);
}

.page-btn:active{
transform:scale(0.92);
box-shadow:0 0 10px #38bdf8;
}

/* PARTICLE */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* MOBILE */

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
}

</style>

<script>

/* OPEN SCRIPT */

function openScript(name){
window.location.href="scriptpage.html?script="+name;
}

/* SEARCH */

function searchScript(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card-item");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();
card.style.display = text.includes(input) ? "block" : "none";

});

}

/* PAGINATION */

const cardsPerPage = 8;
let currentPage = 1;

const cards = document.querySelectorAll(".card-item");
const totalPages = Math.ceil(cards.length / cardsPerPage);

function showPage(page){

if(page<1) page=1;
if(page>totalPages) page=totalPages;

currentPage=page;

const grid=document.getElementById("grid");

grid.style.opacity="0";

setTimeout(()=>{

let start=(page-1)*cardsPerPage;
let end=start+cardsPerPage;

cards.forEach((card,index)=>{

card.style.display=(index>=start && index<end)?"block":"none";

});

grid.style.opacity="1";

renderPagination();

},150);

}

function renderPagination(){

let container=document.getElementById("pagination");

container.innerHTML="";

container.innerHTML+=`<span class="page-btn" onclick="showPage(1)">«</span>`;
container.innerHTML+=`<span class="page-btn" onclick="showPage(${currentPage-1})">‹</span>`;

for(let i=1;i<=Math.min(totalPages,10);i++){

container.innerHTML+=`<span class="page-btn" onclick="showPage(${i})">${i}</span>`;

}

container.innerHTML+=`<span class="page-btn" onclick="showPage(${currentPage+1})">›</span>`;
container.innerHTML+=`<span class="page-btn" onclick="showPage(${totalPages})">»</span>`;

}

showPage(1);

/* PARTICLE BACKGROUND */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){

particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4+0.1
});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#38bdf8";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y-=p.speed;

if(p.y<0){
p.y=canvas.height;
p.x=Math.random()*canvas.width;
}

});

requestAnimationFrame(animate);

}

animate();

</script>
