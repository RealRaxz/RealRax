<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealRax Script Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:sticky;
top:0;
z-index:999;
display:flex;
align-items:center;
justify-content:space-between;
margin:16px;
padding:14px 22px;
border-radius:18px;
background:linear-gradient(180deg,#0b1220,#070f1c);
border:1px solid rgba(255,255,255,0.08);
}

.nav-left{
display:flex;
align-items:center;
gap:12px;
}

.nav-logo{
width:38px;
height:38px;
border-radius:50%;
}

.nav-text{
display:flex;
flex-direction:column;
}

.nav-title{
font-weight:700;
font-size:16px;
}

.nav-status{
font-size:11px;
color:#22c55e;
display:flex;
align-items:center;
gap:6px;
}

.status-dot{
width:7px;
height:7px;
background:#22c55e;
border-radius:50%;
box-shadow:0 0 8px #22c55e;
}

.nav-right{
display:flex;
gap:12px;
}

.nav-btn{
padding:10px 18px;
border-radius:12px;
font-size:14px;
cursor:pointer;
border:1px solid rgba(255,255,255,0.08);
background:#0f172a;
color:white;
text-decoration:none;
}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.title{
font-size:36px;
font-weight:bold;
color:#38bdf8;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{
width:320px;
max-width:90%;
padding:12px;
border-radius:8px;
border:1px solid #ffffff;
background:#020617;
color:white;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;
transition:opacity 0.25s ease;
}

/* CARD */

.card-item{
position:relative;
}

.card{
background:#0f172a;
border:1px solid #ffffff;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-title{
padding:12px;
font-size:15px;
color:#e2e8f0;
}

.badge{
position:absolute;
top:8px;
left:8px;
background:#f59e0b;
color:black;
font-size:12px;
padding:4px 8px;
border-radius:6px;
font-weight:bold;
}

/* PAGINATION */

.pagination{
text-align:center;
margin:40px 0;
}

.page-btn{
display:inline-block;
margin:4px;
padding:10px 16px;
border-radius:10px;
background:#0ea5e9;
color:white;
cursor:pointer;
font-weight:bold;
border:1px solid rgba(255,255,255,0.15);
transition:0.25s;
}

.page-btn:hover{
background:#0284c7;
transform:translateY(-2px);
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
}
</style>
</head>

<script>

/* OPEN SCRIPT */

function openScript(name){
window.location.href="scriptpage.html?script="+name;
}

/* SEARCH */

function searchScript(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card-item");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();
card.style.display = text.includes(input) ? "block" : "none";

});

}

</script>
