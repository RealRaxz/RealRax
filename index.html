<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RealRax Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffffff;
overflow-x:hidden;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
background:#ffffffee;
backdrop-filter:blur(10px);
display:flex;
justify-content:center;
gap:20px;
padding:14px;
z-index:999;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

.navbtn{
padding:10px 20px;
border-radius:8px;
background:#ff2d2d;
color:white;
text-decoration:none;
font-weight:bold;
position:relative;
overflow:hidden;
transition:.2s;
}

.navbtn:hover{
transform:translateY(-3px);
}

.navbtn:active{
transform:scale(.95);
}

/* BUTTON SHINE */

.navbtn::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
transition:.6s;
}

.navbtn:hover::before{
left:100%;
}

/* HEADER */

header{
text-align:center;
padding-top:90px;
font-size:28px;
font-weight:bold;
color:#d60000;
}

/* SEARCH */

.search{
display:flex;
justify-content:center;
margin:20px;
}

.search input{
width:300px;
padding:10px;
border-radius:8px;
border:2px solid #ff2d2d;
}

/* GRID */

.grid{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:20px;
}

/* CARD */

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,.15);
transition:.25s;
position:relative;
}

.card:hover{
transform:translateY(-6px);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:4px 8px;
font-size:12px;
border-radius:6px;
}

.card a{
display:block;
background:#ff2d2d;
color:white;
text-align:center;
padding:10px;
text-decoration:none;
font-weight:bold;
position:relative;
overflow:hidden;
}

.card a:hover{
background:#e30000;
}

.card a::before{
content:'';
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
transition:.6s;
}

.card a:hover::before{
left:100%;
}

/* SNOW */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
}

/* FOOTER */

footer{
text-align:center;
padding:40px;
color:#888;
}

</style>
</head>

<body>

<div class="navbar">
<a class="navbtn" href="index.html">Home</a>
<a class="navbtn" href="download.html">Download</a>
<a class="navbtn" target="_blank"
href="https://www.youtube.com/@RealRaxScripts">YouTube</a>
</div>

<header>Latest Scripts</header>

<div class="search">
<input id="search" placeholder="Search script...">
</div>

<div class="grid" id="grid"></div>

<footer>RealRax Scripts</footer>

<canvas id="snow"></canvas>

<script>

/* DATA (เพิ่มการ์ดตรงนี้) */

const scripts=[
{title:"Blox Fruits Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",badge:"HOT",id:1},
{title:"Auto Farm Script",img:"https://picsum.photos/400?1",badge:"NEW",id:2},
{title:"Auto Level Script",img:"https://picsum.photos/400?2",badge:"",id:3},
{title:"Teleport Script",img:"https://picsum.photos/400?3",badge:"",id:4},
{title:"Boss Farm Script",img:"https://picsum.photos/400?4",badge:"",id:5},
{title:"Raid Script",img:"https://picsum.photos/400?5",badge:"",id:6},
{title:"Script 7",img:"https://picsum.photos/400?6",badge:"",id:7},
{title:"Script 8",img:"https://picsum.photos/400?7",badge:"",id:8},
{title:"Script 9",img:"https://picsum.photos/400?8",badge:"",id:9},
{title:"Script 10",img:"https://picsum.photos/400?9",badge:"",id:10},
{title:"Script 11",img:"https://picsum.photos/400?10",badge:"",id:11},
{title:"Script 12",img:"https://picsum.photos/400?11",badge:"",id:12},
{title:"Script 13",img:"https://picsum.photos/400?12",badge:"",id:13},
{title:"Script 14",img:"https://picsum.photos/400?13",badge:"",id:14},
{title:"Script 15",img:"https://picsum.photos/400?14",badge:"",id:15},
{title:"Script 16",img:"https://picsum.photos/400?15",badge:"",id:16},
{title:"Script 17",img:"https://picsum.photos/400?16",badge:"",id:17},
{title:"Script 18",img:"https://picsum.photos/400?17",badge:"",id:18},
{title:"Script 19",img:"https://picsum.photos/400?18",badge:"",id:19},
{title:"Script 20",img:"https://picsum.photos/400?19",badge:"",id:20}
]

let page=0
let perPage=8
let grid=document.getElementById("grid")

function load(){

let start=page*perPage
let end=start+perPage

scripts.slice(start,end).forEach(s=>{

grid.innerHTML+=`
<div class="card">

${s.badge?`<div class="badge">${s.badge}</div>`:''}

<img src="${s.img}">

<h3>${s.title}</h3>

<a href="script1.html?id=${s.id}">Copy Script</a>

</div>
`

})

page++

}

load()

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){

if(page*perPage<scripts.length){

load()

}

}

})

/* SEARCH */

document.getElementById("search").oninput=function(){

let val=this.value.toLowerCase()

grid.innerHTML=''

scripts.filter(s=>s.title.toLowerCase().includes(val))
.forEach(s=>{

grid.innerHTML+=`
<div class="card">
<img src="${s.img}">
<h3>${s.title}</h3>
<a href="script1.html?id=${s.id}">Copy Script</a>
</div>`

})

}

/* SNOW */

const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

let w=canvas.width=window.innerWidth
let h=canvas.height=window.innerHeight

let snow=[]

for(let i=0;i<120;i++){

snow.push({
x:Math.random()*w,
y:Math.random()*h,
r:Math.random()*3+1,
d:Math.random()+1
})

}

function draw(){

ctx.clearRect(0,0,w,h)

ctx.fillStyle="white"

ctx.beginPath()

for(let i of snow){

ctx.moveTo(i.x,i.y)

ctx.arc(i.x,i.y,i.r,0,Math.PI*2,true)

}

ctx.fill()

update()

}

function update(){

for(let i of snow){

i.y+=i.d

if(i.y>h){

i.y=0

i.x=Math.random()*w

}

}

}

setInterval(draw,33)

</script>

</body>
</html>
