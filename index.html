<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Script Library</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}

/* GRID */

.script-grid{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:25px;

max-width:1200px;

margin:auto;

padding:40px;

}

/* CARD */

.card{

background:white;

border-radius:12px;

overflow:hidden;

box-shadow:0 6px 16px rgba(0,0,0,0.15);

transition:.25s;

}

.card:hover{

transform:translateY(-6px);

}

.card img{

width:100%;

height:160px;

object-fit:cover;

}

/* CARD BODY */

.card-body{

padding:18px;

}

.title{

font-weight:bold;

margin-bottom:8px;

}

.status{

color:green;

font-size:14px;

margin-bottom:14px;

}

/* BUTTON */

.btn{

background:#d60000;

color:white;

border:none;

padding:10px 16px;

border-radius:6px;

cursor:pointer;

}

.btn:hover{

background:#b80000;

}

/* PAGINATION */

.pagination{

text-align:center;

padding-bottom:40px;

}

.pagination button{

background:#d60000;

color:white;

border:none;

padding:8px 12px;

margin:3px;

border-radius:4px;

cursor:pointer;

}

/* MOBILE */

@media(max-width:900px){

.script-grid{

grid-template-columns:repeat(2,1fr);

}

}

@media(max-width:500px){

.script-grid{

grid-template-columns:1fr;

}

}

</style>

</head>

<body>

<div class="script-grid" id="grid"></div>

<div class="pagination" id="pages"></div>

<script>

/* DATA */

const scripts=[

{title:"Blox Fruits Auto Farm",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Blox Fruits Auto Raid",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Anime Fighters Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"King Legacy Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},

{title:"Pet Simulator Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Doors Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Anime Warriors Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Anime Souls Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},

{title:"Pet Simulator X Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Blox Fruits Boss Farm",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Fruit Finder Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Anime Adventure Script",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"}

]

/* PAGINATION */

const perPage=8

let page=1

function render(){

let start=(page-1)*perPage

let end=start+perPage

let items=scripts.slice(start,end)

let grid=document.getElementById("grid")

grid.innerHTML=""

items.forEach((s,i)=>{

grid.innerHTML+=`

<div class="card">

<img src="${s.img}">

<div class="card-body">

<div class="title">${s.title}</div>

<div class="status">🟢 Working</div>

<a href="script1.html?id=${start+i+1}">
<button class="btn">📜 Get Script</button>
</a>

</div>

</div>

`

})

renderPages()

}

function renderPages(){

let pages=Math.ceil(scripts.length/perPage)

let container=document.getElementById("pages")

container.innerHTML=""

for(let i=1;i<=pages;i++){

container.innerHTML+=`
<button onclick="go(${i})">${i}</button>
`

}

}

function go(p){

page=p

render()

}

render()

</script>

</body>
</html>
