<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RealRax Script Library</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* SEARCH */

.search{
text-align:center;
margin-top:40px;
}

.search input{
width:300px;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

/* CATEGORY */

.category{
text-align:center;
margin:20px 0;
}

.category button{

background:#d60000;
color:white;

border:none;
padding:8px 16px;

border-radius:6px;

margin:5px;

cursor:pointer;

}

/* GRID */

.cards{

max-width:1200px;
margin:auto;

display:grid;

/* แก้ตรงนี้ */

grid-template-columns:repeat(4,1fr);

gap:30px;

padding:20px;

}

/* CARD */

.card{

background:white;

border-radius:12px;

overflow:hidden;

box-shadow:0 8px 20px rgba(0,0,0,0.15);

}

.card img{

width:100%;
height:170px;

object-fit:cover;

}

.card-body{

padding:15px;

}

.card-title{

font-size:18px;
font-weight:bold;

margin-bottom:8px;

}

.status{

color:green;
font-size:14px;

}

.get{

margin-top:12px;

background:#d60000;
color:white;

border:none;

padding:8px 14px;

border-radius:6px;

cursor:pointer;

}

/* PAGINATION */

.pagination{

text-align:center;

margin:30px 0;

}

.pagination button{

background:#d60000;
color:white;

border:none;

padding:8px 12px;

margin:4px;

border-radius:6px;

cursor:pointer;

}

.pagination button.active{
background:#8a0000;
}

/* MOBILE */

@media(max-width:1000px){

.cards{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:700px){

.cards{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:450px){

.cards{
grid-template-columns:1fr;
}

}

</style>

</head>
