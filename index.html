<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* particle background */

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:200%;
z-index:-1;

background-image:
radial-gradient(2px 2px at 10% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 20% 40%, #38bdf8, transparent),
radial-gradient(2px 2px at 30% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 40% 30%, #38bdf8, transparent),
radial-gradient(2px 2px at 50% 60%, #38bdf8, transparent),
radial-gradient(2px 2px at 60% 80%, #38bdf8, transparent),
radial-gradient(2px 2px at 70% 50%, #38bdf8, transparent),
radial-gradient(2px 2px at 80% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 90% 70%, #38bdf8, transparent);

animation:move 30s linear infinite;
}

@keyframes move{
0%{transform:translateY(0)}
100%{transform:translateY(-50%)}
}

/* header */

header{
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

/* search */

.search{
text-align:center;
margin-bottom:25px;
}

.search input{
padding:10px;
width:260px;
background:#0f172a;
border:none;
color:white;
border-radius:6px;
}

/* grid */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

.card{
background:#0f172a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 15px #38bdf8;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:14px;
color:#38bdf8;
}

.top{
color:#facc15;
padding:8px;
font-size:13px;
}

</style>
</head>

<body>

<div class="particles"></div>

<header>RealRax Script Hub</header>

<div class="container">

<div class="search">
<input id="search" placeholder="Search Script..." onkeyup="searchScript()">
</div>

<div class="grid" id="videos"></div>

</div>

<script>

const channelID="UCQpsD3OgICNaiyGaVeiC5BQ"

async function loadVideos(){

try{

const url="https://api.allorigins.win/get?url="+encodeURIComponent("https://www.youtube.com/feeds/videos.xml?channel_id="+channelID)

const res=await fetch(url)
const data=await res.json()

const parser=new DOMParser()
const xml=parser.parseFromString(data.contents,"text/xml")

const items=xml.querySelectorAll("entry")

const grid=document.getElementById("videos")

items.forEach((video,i)=>{

let id=video.querySelector("videoId").textContent
let title=video.querySelector("title").textContent

let card=document.createElement("div")
card.className="card"

card.onclick=()=>{
window.location="scriptpage.html?video="+id
}

card.innerHTML=`
${i==0?'<div class="top">⭐ Top Script</div>':''}
<img src="https://img.youtube.com/vi/${id}/hqdefault.jpg">
<h3>${title}</h3>
`

grid.appendChild(card)

})

}catch(e){

console.error("โหลดคลิปไม่ได้",e)

}

}

loadVideos()

function searchScript(){

let input=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(input)?"block":"none"

})

}

</script>

</body>
</html>
