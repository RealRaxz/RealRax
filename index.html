<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Galaxy</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* BACKGROUND IMAGE ANIMATION */

.bg{

position:fixed;
top:0;
left:0;
width:100%;
height:200%;
z-index:-1;

background-image:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564");

background-size:cover;
background-repeat:repeat-y;
background-position:center;

animation:bgmove 60s linear infinite;

filter:brightness(0.35);

}

@keyframes bgmove{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-50%);
}

}

/* HEADER */

header{
padding:25px;
font-size:26px;
font-weight:bold;
text-align:center;
color:#38bdf8;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{
background:#0b1220;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #0ea5e9;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:15px;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="bg"></div>

<header>Script Galaxy</header>

<div class="container">

<div class="grid">

<div class="card" onclick="openScript('bloxfruit')">

<img src="https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png">

<h3>Blox Fruits Auto Farm</h3>

</div>

<div class="card" onclick="openScript('esp')">

<img src="https://tr.rbxcdn.com/9c9f0fdde9d2c1c3e3cb14d6c2e1dbb6/768/432/Image/Png">

<h3>ESP Player</h3>

</div>

</div>

</div>

<script>

function openScript(name){
window.location.href="scriptpage.html?script="+name
}

</script>

</body>
</html>
