<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Christmas Scripts</title>

<style>

*{box-sizing:border-box;}

body{
margin:0;
font-family:Arial;
background:white;
color:#333;
}

/* NAVBAR */

.navbar{
background:#d60000;
color:white;
padding:15px 40px;
font-size:22px;
font-weight:bold;
}

/* HERO */

.hero{
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:70px 20px;
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:25px;
}

/* CARD */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card a{
display:inline-block;
background:#d60000;
color:white;
padding:10px 18px;
margin:15px;
border-radius:6px;
text-decoration:none;
}

/* PAGINATION */

.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
padding:10px 14px;
margin:5px;
border:none;
background:#d60000;
color:white;
border-radius:6px;
cursor:pointer;
}

/* SNOW */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

/* RESPONSIVE */

@media(max-width:900px){
.grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.grid{grid-template-columns:1fr;}
}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">
🎄 Christmas Scripts
</div>

<div class="hero">

<h1>Latest Scripts</h1>
<p>Free Roblox Scripts Collection</p>

</div>


<div class="container">

<div id="scripts" class="grid"></div>

<div class="pagination">

<button onclick="page(1)">1</button>
<button onclick="page(2)">2</button>

</div>

</div>


<script>

/* DATA */

const data=[

{title:"Blox Fruits Auto Farm",img:"https://picsum.photos/400/200?1",link:"script1.html"},
{title:"Blox Fruits Auto Raid",img:"https://picsum.photos/400/200?2",link:"script1.html"},
{title:"King Legacy Script",img:"https://picsum.photos/400/200?3",link:"script1.html"},
{title:"Anime Fighters Script",img:"https://picsum.photos/400/200?4",link:"script1.html"},
{title:"Pet Simulator Script",img:"https://picsum.photos/400/200?5",link:"script1.html"},
{title:"Doors Script",img:"https://picsum.photos/400/200?6",link:"script1.html"},

{title:"Blade Ball Script",img:"https://picsum.photos/400/200?7",link:"script1.html"},
{title:"Adopt Me Script",img:"https://picsum.photos/400/200?8",link:"script1.html"},
{title:"Arsenal Script",img:"https://picsum.photos/400/200?9",link:"script1.html"},
{title:"Brookhaven Script",img:"https://picsum.photos/400/200?10",link:"script1.html"},
{title:"Tower Defense Script",img:"https://picsum.photos/400/200?11",link:"script1.html"},
{title:"MM2 Script",img:"https://picsum.photos/400/200?12",link:"script1.html"}

];

/* PAGINATION */

function page(num){

let container=document.getElementById("scripts");

container.innerHTML="";

let start=(num-1)*6;
let end=start+6;

let items=data.slice(start,end);

items.forEach(script=>{

container.innerHTML+=`

<div class="card">

<img src="${script.img}">
<h3>${script.title}</h3>

<a href="${script.link}">Get Script</a>

</div>

`;

});

}

page(1);


/* SNOW */

const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let snow=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

window.addEventListener("resize",resize);

resize();

for(let i=0;i<180;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";
ctx.beginPath();

snow.forEach(f=>{
ctx.moveTo(f.x,f.y);
ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
});

ctx.fill();

snow.forEach(f=>{

f.y+=f.speed;

if(f.y>canvas.height){
f.y=0;
f.x=Math.random()*canvas.width;
}

});

}

setInterval(draw,30);

</script>

</body>
</html>
