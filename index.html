<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Galaxy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#030712;
color:white;
overflow-x:hidden;
}

/* GALAXY BACKGROUND */

.galaxy{

position:fixed;
top:0;
left:0;
width:200%;
height:200%;

background:

radial-gradient(circle at 20% 30%, rgba(14,165,233,0.4), transparent 40%),
radial-gradient(circle at 70% 60%, rgba(59,130,246,0.35), transparent 45%),
radial-gradient(circle at 40% 80%, rgba(2,132,199,0.3), transparent 40%);

animation:galaxyMove 60s linear infinite;

z-index:-2;

}

.stars{

position:fixed;
top:0;
left:0;
width:100%;
height:200%;

background-image:

radial-gradient(2px 2px at 20% 20%, white, transparent),
radial-gradient(2px 2px at 80% 40%, white, transparent),
radial-gradient(1px 1px at 60% 80%, white, transparent),
radial-gradient(2px 2px at 30% 70%, white, transparent),
radial-gradient(1px 1px at 90% 10%, white, transparent),
radial-gradient(2px 2px at 10% 90%, white, transparent);

animation:starsMove 120s linear infinite;

z-index:-1;

}

@keyframes galaxyMove{

from{
transform:translateY(0);
}

to{
transform:translateY(-500px);
}

}

@keyframes starsMove{

from{
transform:translateY(0);
}

to{
transform:translateY(-800px);
}

}

/* HEADER */

header{
padding:25px;
font-size:24px;
font-weight:bold;
color:#38bdf8;
text-align:center;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#0b1220;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 25px #0ea5e9;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:15px;
color:#38bdf8;
}

</style>

</head>

<body>

<div class="galaxy"></div>
<div class="stars"></div>

<header>Script Galaxy</header>

<div class="container">

<div class="grid">

<div class="card" onclick="openScript('bloxfruit')">

<img src="https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png">

<h3>Blox Fruits Auto Farm</h3>

</div>

<div class="card" onclick="openScript('esp')">

<img src="https://tr.rbxcdn.com/9c9f0fdde9d2c1c3e3cb14d6c2e1dbb6/768/432/Image/Png">

<h3>ESP Player Script</h3>

</div>

<div class="card" onclick="openScript('speed')">

<img src="https://tr.rbxcdn.com/0a2f3e6e6a6bfa89f1f9d35c1d7b1a2b/768/432/Image/Png">

<h3>Speed Hack</h3>

</div>

</div>

</div>

<script>

function openScript(name){
window.location.href="scriptpage.html?script="+name
}

</script>

</body>
</html>
