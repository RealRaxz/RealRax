<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:#333;
}

/* navbar */

.navbar{
position:sticky;
top:0;
background:#d60000;
color:white;
padding:16px 30px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:999;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.nav-links a{
color:white;
margin-left:20px;
text-decoration:none;
padding:8px 14px;
border-radius:6px;
position:relative;
overflow:hidden;
}

/* button animation */

.nav-links a:hover{
transform:translateY(-2px);
}

.nav-links a:active{
transform:scale(0.95);
}

/* hero */

.hero{
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:60px 20px;
}

/* search */

.search{
text-align:center;
margin:30px;
}

.search input{
padding:12px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

/* grid */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
overflow:hidden;
position:relative;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card a{
display:inline-block;
background:#d60000;
color:white;
padding:10px 18px;
margin:15px;
border-radius:6px;
text-decoration:none;
transition:0.3s;
}

.card a:hover{
transform:translateY(-2px);
}

.card a:active{
transform:scale(0.95);
}

/* badge */

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff0000;
color:white;
padding:4px 10px;
font-size:12px;
border-radius:5px;
}

/* snow */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>
</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">

<div><b>🎄 RealRax Scripts</b></div>

<div class="nav-links">
<a href="download.html">Download</a>
<a href="https://www.youtube.com/@RealRaxScripts" target="_blank">YouTube</a>
</div>

</div>

<div class="hero">
<h1>Latest Scripts</h1>
<p>Free Roblox Scripts</p>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search script...">
</div>

<div class="container">
<div class="grid" id="grid"></div>
</div>

<script>

/* scripts */

const scripts=[
{title:"Blox Fruits Auto Farm",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",badge:"HOT",id:1},
{title:"Blox Fruits Auto Raid",img:"https://picsum.photos/400/200?2",badge:"NEW",id:2},
{title:"King Legacy Script",img:"https://picsum.photos/400/200?3",badge:"",id:3},
{title:"Anime Fighters Script",img:"https://picsum.photos/400/200?4",badge:"HOT",id:4},
{title:"Pet Simulator Script",img:"https://picsum.photos/400/200?5",badge:"",id:5},
{title:"Doors Script",img:"https://picsum.photos/400/200?6",badge:"NEW",id:6},
{title:"Fast Farm Blox Fruits",img:"https://picsum.photos/400/200?7",badge:"",id:7},
{title:"Anime Warriors Script",img:"https://picsum.photos/400/200?8",badge:"",id:8}
]

let loaded=6

function render(){

const grid=document.getElementById("grid")

let search=document.getElementById("search").value.toLowerCase()

grid.innerHTML=""

scripts
.filter(s=>s.title.toLowerCase().includes(search))
.slice(0,loaded)
.forEach(s=>{

grid.innerHTML+=`

<div class="card">

${s.badge?`<div class="badge">${s.badge}</div>`:""}

<img src="${s.img}">

<h3>${s.title}</h3>

<a href="script1.html?id=${s.id}">Get Script</a>

</div>

`

})

}

render()

document.getElementById("search").addEventListener("input",render)

/* infinite scroll */

window.addEventListener("scroll",()=>{

if(window.innerHeight+window.scrollY>=document.body.offsetHeight-200){

loaded+=2
render()

}

})

/* snow */

const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

let snow=[]

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()

window.addEventListener("resize",resize)

for(let i=0;i<180;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

ctx.beginPath()

snow.forEach(f=>{
ctx.moveTo(f.x,f.y)
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
})

ctx.fill()

snow.forEach(f=>{

f.y+=f.speed

if(f.y>canvas.height){

f.y=0
f.x=Math.random()*canvas.width

}

})

}

setInterval(draw,30)

</script>

</body>
</html>
