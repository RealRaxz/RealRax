<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>RealRax Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
}

/* navbar */

.navbar{
position:sticky;
top:0;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
background:#d60000;
color:white;
z-index:999;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

/* button animation */

.btn{

position:relative;
overflow:hidden;
background:#d60000;
color:white;
padding:10px 16px;
border-radius:6px;
text-decoration:none;
border:none;
cursor:pointer;
transition:0.25s;
display:inline-block;

}

.btn:hover{
transform:translateY(-3px);
}

.btn:active{
transform:scale(0.95);
}

.btn::after{

content:"";
position:absolute;
top:0;
left:-100%;
width:100%;
height:100%;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.6),transparent);
transition:0.6s;

}

.btn:hover::after{
left:100%;
}

/* nav links */

.nav-links a{
margin-left:20px;
}

/* hero */

.hero{
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:70px 20px;
}

/* search */

.search{
text-align:center;
margin:30px;
}

.search input{
padding:12px;
width:250px;
border-radius:6px;
border:1px solid #ccc;
}

/* grid */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* card */

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,0.15);
transition:0.3s;
position:relative;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:15px;
}

/* badge */

.badge{
position:absolute;
top:10px;
left:10px;
background:red;
color:white;
padding:4px 10px;
border-radius:5px;
font-size:12px;
}

/* pagination */

.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
margin:4px;
}

/* snow */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">

<div>🎄 RealRax Scripts</div>

<div class="nav-links">

<a class="btn" href="download.html">Download</a>

<a class="btn" href="https://www.youtube.com/@RealRaxScripts" target="_blank">YouTube</a>

</div>

</div>

<div class="hero">
<h1>Latest Scripts</h1>
<p>🔥 Roblox Scripts ล่าสุด</p>
</div>

<div class="search">
<input id="search" placeholder="🔎 Search Script">
</div>

<div class="container">

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>

/* scripts */

const scripts=[

{title:"Blox Fruits Auto Farm",img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",badge:"HOT",id:1},
{title:"Blox Fruits Auto Raid",img:"https://picsum.photos/400/200?2",badge:"NEW",id:2},
{title:"King Legacy Script",img:"https://picsum.photos/400/200?3",badge:"",id:3},
{title:"Anime Fighters Script",img:"https://picsum.photos/400/200?4",badge:"HOT",id:4},
{title:"Pet Simulator Script",img:"https://picsum.photos/400/200?5",badge:"",id:5},
{title:"Doors Script",img:"https://picsum.photos/400/200?6",badge:"NEW",id:6},
{title:"Script 7",img:"https://picsum.photos/400/200?7",badge:"",id:7},
{title:"Script 8",img:"https://picsum.photos/400/200?8",badge:"",id:8},
{title:"Script 9",img:"https://picsum.photos/400/200?9",badge:"",id:9},
{title:"Script 10",img:"https://picsum.photos/400/200?10",badge:"",id:10},
{title:"Script 11",img:"https://picsum.photos/400/200?11",badge:"",id:11},
{title:"Script 12",img:"https://picsum.photos/400/200?12",badge:"",id:12},
{title:"Script 13",img:"https://picsum.photos/400/200?13",badge:"",id:13},
{title:"Script 14",img:"https://picsum.photos/400/200?14",badge:"",id:14},
{title:"Script 15",img:"https://picsum.photos/400/200?15",badge:"",id:15},
{title:"Script 16",img:"https://picsum.photos/400/200?16",badge:"",id:16},
{title:"Script 17",img:"https://picsum.photos/400/200?17",badge:"",id:17},
{title:"Script 18",img:"https://picsum.photos/400/200?18",badge:"",id:18},
{title:"Script 19",img:"https://picsum.photos/400/200?19",badge:"",id:19},
{title:"Script 20",img:"https://picsum.photos/400/200?20",badge:"",id:20}

]

let page=1
const perPage=8

function render(){

const grid=document.getElementById("grid")

let search=document.getElementById("search").value.toLowerCase()

let filtered=scripts.filter(s=>s.title.toLowerCase().includes(search))

let start=(page-1)*perPage

let items=filtered.slice(start,start+perPage)

grid.innerHTML=""

items.forEach(s=>{

grid.innerHTML+=`

<div class="card">

${s.badge?`<div class="badge">${s.badge}</div>`:""}

<img src="${s.img}">

<h3>${s.title}</h3>

<a class="btn" href="script1.html?id=${s.id}">Get Script</a>

</div>

`

})

renderPagination(filtered.length)

}

function renderPagination(total){

let pages=Math.ceil(total/perPage)

let html=""

html+=`<button class="btn" onclick="goPage(page-1)"><</button>`

for(let i=1;i<=pages;i++){

html+=`<button class="btn" onclick="goPage(${i})">${i}</button>`

}

html+=`<button class="btn" onclick="goPage(page+1)">></button>`

document.getElementById("pagination").innerHTML=html

}

function goPage(p){

let pages=Math.ceil(scripts.length/perPage)

if(p<1 || p>pages) return

page=p

render()

}

document.getElementById("search").addEventListener("input",()=>{

page=1
render()

})

render()

</script>

</body>
</html>
