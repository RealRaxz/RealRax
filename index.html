<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Galaxy</title>

<style>

body{
margin:0;
font-family:Arial;
background:#030712;
color:white;
overflow-x:hidden;
}

/* BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
z-index:-1;
background:
radial-gradient(circle at 20% 30%, rgba(0,140,255,0.25), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(0,90,255,0.25), transparent 45%),
radial-gradient(circle at 50% 90%, rgba(0,170,255,0.2), transparent 40%);
animation:movebg 60s linear infinite;
filter:blur(40px);
}

@keyframes movebg{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-600px);
}

}

/* HEADER */

header{
padding:25px;
font-size:26px;
font-weight:bold;
text-align:center;
color:#38bdf8;
}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
}

.card{

background:#0b1220;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;

}

.card:hover{

transform:translateY(-8px);
box-shadow:0 0 25px #0ea5e9;

}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
padding:15px;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="bg"></div>

<header>Script Galaxy</header>

<div class="container">

<div class="grid">

<div class="card" onclick="openScript('bloxfruit')">

<img src="https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png">

<h3>Blox Fruits Auto Farm</h3>

</div>

<div class="card" onclick="openScript('esp')">

<img src="https://tr.rbxcdn.com/9c9f0fdde9d2c1c3e3cb14d6c2e1dbb6/768/432/Image/Png">

<h3>ESP Player</h3>

</div>

</div>

</div>

<script>

function openScript(name){

window.location.href="scriptpage.html?script="+name

}

</script>

</body>
</html>
