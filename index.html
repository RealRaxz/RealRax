<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;

background:
linear-gradient(135deg,#0f172a,#020617,#1e293b);
}

/* NAVBAR */

.navbar{

position:sticky;
top:0;
z-index:999;

display:flex;
align-items:center;
justify-content:space-between;

margin:16px;
padding:14px 22px;

border-radius:20px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,0.18);

box-shadow:0 8px 32px rgba(0,0,0,0.4);

}

.nav-left{
display:flex;
align-items:center;
gap:12px;
}

.nav-logo{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

.nav-text{
display:flex;
flex-direction:column;
}

.nav-title{
font-weight:700;
font-size:16px;
}

.nav-status{
font-size:11px;
color:#22c55e;
display:flex;
align-items:center;
gap:6px;
}

.status-dot{
width:7px;
height:7px;
background:#22c55e;
border-radius:50%;
box-shadow:0 0 8px #22c55e;
}

.nav-right{
display:flex;
gap:12px;
}

.nav-btn{

padding:10px 18px;

border-radius:12px;

font-size:14px;

cursor:pointer;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.2);

color:white;

text-decoration:none;

transition:0.25s;

}

.nav-btn:hover{

background:rgba(255,255,255,0.18);

transform:translateY(-2px);

}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.title{
font-size:36px;
font-weight:bold;
color:#38bdf8;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{

width:320px;
max-width:90%;

padding:12px;

border-radius:10px;

background:rgba(255,255,255,0.08);

border:1px solid rgba(255,255,255,0.2);

backdrop-filter:blur(10px);

color:white;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

padding:20px;

max-width:1100px;

margin:auto;

transition:opacity 0.25s ease;

}

/* CARD */

.card-item{
position:relative;
}

.card{

background:rgba(255,255,255,0.08);

backdrop-filter:blur(20px);

border-radius:16px;

border:1px solid rgba(255,255,255,0.18);

box-shadow:0 8px 24px rgba(0,0,0,0.35);

overflow:hidden;

cursor:pointer;

transition:0.25s;

}

.card:hover{

transform:translateY(-6px) scale(1.02);

box-shadow:0 15px 40px rgba(0,0,0,0.45);

}

.card img{

width:100%;
height:140px;

object-fit:cover;

}

.card-title{

padding:12px;

font-size:15px;

color:#e2e8f0;

}

.badge{

position:absolute;

top:8px;
left:8px;

background:#f59e0b;

color:black;

font-size:12px;

padding:4px 8px;

border-radius:6px;

font-weight:bold;

}

/* PAGINATION */

.pagination{

text-align:center;

margin:40px 0;

}

.page-btn{

display:inline-block;

margin:4px;

padding:10px 16px;

border-radius:12px;

background:rgba(255,255,255,0.1);

backdrop-filter:blur(10px);

border:1px solid rgba(255,255,255,0.2);

color:white;

cursor:pointer;

transition:0.25s;

}

.page-btn:hover{

background:rgba(255,255,255,0.18);

transform:translateY(-2px);

}

.page-btn:active{

transform:scale(0.9);

}

/* PARTICLES */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* MOBILE */

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:500px){
.grid{
grid-template-columns:1fr;
}
}

</style>

</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="nav-left">

<img src="logo.png" class="nav-logo">

<div class="nav-text">

<div class="nav-title">RealRax</div>

<div class="nav-status">
<span class="status-dot"></span>
OPERATIONAL
</div>

</div>

</div>

<div class="nav-right">

<a class="nav-btn">Download</a>
<a class="nav-btn">Purchase</a>
<a class="nav-btn">Discord</a>

</div>

</div>

<canvas id="particles"></canvas>

<div class="header">
<div class="title">🚀 RealRax Script Hub</div>
</div>

<div class="search">
<input id="search" placeholder="🔎 Search Script..." onkeyup="searchScript()">
</div>

<div class="grid" id="grid">

</div>

<div class="pagination" id="pagination"></div>

<script>

function searchScript(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card-item");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();
card.style.display = text.includes(input) ? "block" : "none";

});

}

/* PARTICLE BACKGROUND */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4+0.1

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#38bdf8";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y-=p.speed;

if(p.y<0){

p.y=canvas.height;
p.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
