<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* PARTICLE BACKGROUND */

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:200%;
z-index:-1;

background-image:
radial-gradient(2px 2px at 10% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 20% 40%, #38bdf8, transparent),
radial-gradient(2px 2px at 30% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 40% 30%, #38bdf8, transparent),
radial-gradient(2px 2px at 50% 60%, #38bdf8, transparent),
radial-gradient(2px 2px at 60% 80%, #38bdf8, transparent),
radial-gradient(2px 2px at 70% 50%, #38bdf8, transparent),
radial-gradient(2px 2px at 80% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 90% 70%, #38bdf8, transparent);

animation:move 35s linear infinite;
}

@keyframes move{
0%{transform:translateY(0)}
100%{transform:translateY(-50%)}
}

/* HEADER */

header{
text-align:center;
padding:25px;
font-size:28px;
color:#38bdf8;
font-weight:bold;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{
padding:10px;
width:260px;
background:#0f172a;
border:none;
border-radius:6px;
color:white;
}

/* GRID */

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

/* MOBILE */

@media(max-width:900px){
.grid{
grid-template-columns:repeat(2,1fr);
}
}

.card{
background:#0f172a;
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 0 15px #38bdf8;
}

.card img{
width:100%;
height:130px;
object-fit:cover;
}

.card h3{
padding:10px;
font-size:14px;
color:#38bdf8;
}

.top{
color:#facc15;
padding:8px;
font-size:13px;
}

</style>
</head>

<body>

<div class="particles"></div>

<header>RealRax Script Hub</header>

<div class="container">

<div class="search">
<input id="search" placeholder="Search Script..." onkeyup="searchScript()">
</div>

<div class="grid">

<!-- SCRIPT 1 -->

<div class="card" onclick="openScript('script1')">
<div class="top">⭐ Top Script</div>
<img src="IMAGE_LINK">
<h3>Script Title 1</h3>
</div>

<!-- SCRIPT 2 -->

<div class="card" onclick="openScript('script2')">
<img src="IMAGE_LINK">
<h3>Script Title 2</h3>
</div>

<!-- SCRIPT 3 -->

<div class="card" onclick="openScript('script3')">
<img src="IMAGE_LINK">
<h3>Script Title 3</h3>
</div>

<!-- SCRIPT 4 -->

<div class="card" onclick="openScript('script4')">
<img src="IMAGE_LINK">
<h3>Script Title 4</h3>
</div>

<!-- SCRIPT 5 -->

<div class="card" onclick="openScript('script5')">
<img src="IMAGE_LINK">
<h3>Script Title 5</h3>
</div>

<!-- SCRIPT 6 -->

<div class="card" onclick="openScript('script6')">
<img src="IMAGE_LINK">
<h3>Script Title 6</h3>
</div>

<!-- SCRIPT 7 -->

<div class="card" onclick="openScript('script7')">
<img src="IMAGE_LINK">
<h3>Script Title 7</h3>
</div>

<!-- SCRIPT 8 -->

<div class="card" onclick="openScript('script8')">
<img src="IMAGE_LINK">
<h3>Script Title 8</h3>
</div>

<!-- SCRIPT 9 -->

<div class="card" onclick="openScript('script9')">
<img src="IMAGE_LINK">
<h3>Script Title 9</h3>
</div>

<!-- SCRIPT 10 -->

<div class="card" onclick="openScript('script10')">
<img src="IMAGE_LINK">
<h3>Script Title 10</h3>
</div>

</div>

</div>

<script>

function openScript(name){

window.location="scriptpage.html?script="+name

}

function searchScript(){

let input=document.getElementById("search").value.toLowerCase()

document.querySelectorAll(".card").forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(input)?"block":"none"

})

}

</script>

</body>
</html>
