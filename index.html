<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Script Hub</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#f2f2f2;
}

/* hero */

.hero{
background:#c40000;
padding:70px 20px;
text-align:center;
color:white;
position:relative;
overflow:hidden;
}

.hero h1{
margin:0;
font-size:38px;
}

/* snow */

canvas{
position:absolute;
top:0;
left:0;
pointer-events:none;
}

/* grid */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

/* card */

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
transition:0.3s;
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
padding:10px;
margin:0;
}

.btn{
display:inline-block;
background:#d60000;
color:white;
padding:10px 16px;
margin:10px;
border-radius:6px;
text-decoration:none;
transition:0.2s;
}

/* button animation */

.btn:hover{
transform:translateY(-4px);
box-shadow:0 6px 12px rgba(0,0,0,0.3);
}

.btn:active{
transform:scale(0.92);
}

/* pagination */

.pagination{
text-align:center;
margin-top:30px;
}

.page-btn{
background:#d60000;
color:white;
padding:8px 14px;
margin:4px;
border-radius:6px;
cursor:pointer;
display:inline-block;
transition:0.2s;
}

.page-btn:hover{
transform:translateY(-3px);
}

.page-btn:active{
transform:scale(0.9);
}

</style>
</head>

<body>

<div class="hero">
<h1>🔥 Roblox Script Hub</h1>
<canvas id="snow"></canvas>
</div>

<div class="container">

<div id="cardContainer" class="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>

/* ==========================
   เพิ่มการ์ดตรงนี้
========================== */

const cards=[

{
title:"Blox Fruits Auto Farm",
img:"https://picsum.photos/400/200?1",
id:1
},

{
title:"Blox Fruits Auto Raid",
img:"https://picsum.photos/400/200?2",
id:2
},

{
title:"King Legacy Script",
img:"https://picsum.photos/400/200?3",
id:3
},

{
title:"Anime Fighters Script",
img:"https://picsum.photos/400/200?4",
id:4
},

{
title:"Pet Simulator Script",
img:"https://picsum.photos/400/200?5",
id:5
},

{
title:"Doors Script",
img:"https://picsum.photos/400/200?6",
id:6
},

{
title:"Blade Ball Script",
img:"https://picsum.photos/400/200?7",
id:7
},

{
title:"Brookhaven Script",
img:"https://picsum.photos/400/200?8",
id:8
},

{
title:"Shindo Life Script",
img:"https://picsum.photos/400/200?9",
id:9
},

{
title:"Arsenal Script",
img:"https://picsum.photos/400/200?10",
id:10
}

]

/* ========================== */

const perPage=8
let page=1

function render(){

let start=(page-1)*perPage
let end=start+perPage

let show=cards.slice(start,end)

let html=""

show.forEach(c=>{

html+=`
<div class="card">

<img src="${c.img}">

<h3>${c.title}</h3>

<a class="btn" href="script.html?id=${c.id}">
Get Script
</a>

</div>
`

})

document.getElementById("cardContainer").innerHTML=html

renderPagination()

}

function renderPagination(){

let total=Math.ceil(cards.length/perPage)

let html=""

html+=`<span class="page-btn" onclick="prev()">Prev</span>`

for(let i=1;i<=total;i++){

html+=`<span class="page-btn" onclick="go(${i})">${i}</span>`

}

html+=`<span class="page-btn" onclick="next()">Next</span>`

document.getElementById("pagination").innerHTML=html

}

function go(p){

page=p
render()

}

function next(){

page++
render()

}

function prev(){

page--
if(page<1)page=1
render()

}

render()

/* snow */

const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=200

let snow=[]

for(let i=0;i<80;i++){

snow.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3,
s:Math.random()

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

snow.forEach(f=>{

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()

f.y+=f.s

if(f.y>200)f.y=0

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
