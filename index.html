<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:#333;
}

/* navbar */

.navbar{
background:#d60000;
color:white;
padding:18px 40px;
font-size:22px;
font-weight:bold;
}

/* hero */

.hero{
background:linear-gradient(#d60000,#ff4040);
color:white;
text-align:center;
padding:70px 20px;
}

.hero h1{
margin:0;
font-size:40px;
}

/* search */

.search{
text-align:center;
margin:30px 0;
}

.search input{
padding:12px;
width:260px;
border-radius:6px;
border:1px solid #ccc;
}

/* container */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* grid */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

/* card */

.card{
background:white;
border-radius:10px;
box-shadow:0 8px 18px rgba(0,0,0,0.15);
overflow:hidden;
position:relative;
}

.card img{
width:100%;
height:160px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card a{
display:inline-block;
background:#d60000;
color:white;
padding:10px 18px;
margin:15px;
border-radius:6px;
text-decoration:none;
}

/* badge */

.badge{
position:absolute;
top:10px;
left:10px;
background:#ff0000;
color:white;
padding:4px 10px;
font-size:12px;
border-radius:5px;
}

/* pagination */

.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
padding:8px 14px;
margin:4px;
border:none;
background:#d60000;
color:white;
border-radius:5px;
cursor:pointer;
}

/* snow */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">
🎄 RealRax Scripts
</div>

<div class="hero">
<h1>Latest Scripts</h1>
<p>Free Roblox Scripts</p>
</div>

<div class="search">
<input type="text" id="search" placeholder="Search script...">
</div>

<div class="container">

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>

/* scripts */

const scripts=[

{
title:"Blox Fruits Auto Farm",
img:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg",
badge:"HOT",
id:1
},

{
title:"Blox Fruits Auto Raid",
img:"https://picsum.photos/400/200?2",
badge:"NEW",
id:2
},

{
title:"King Legacy Script",
img:"https://picsum.photos/400/200?3",
badge:"",
id:3
},

{
title:"Anime Fighters Script",
img:"https://picsum.photos/400/200?4",
badge:"",
id:4
},

{
title:"Pet Simulator Script",
img:"https://picsum.photos/400/200?5",
badge:"",
id:5
},

{
title:"Doors Script",
img:"https://picsum.photos/400/200?6",
badge:"NEW",
id:6
},

{
title:"Blox Fruits Fast Farm",
img:"https://picsum.photos/400/200?7",
badge:"",
id:7
},

{
title:"Anime Warriors Script",
img:"https://picsum.photos/400/200?8",
badge:"",
id:8
}

]

let page=1
const perPage=6

function render(){

const grid=document.getElementById("grid")

const search=document.getElementById("search").value.toLowerCase()

let filtered=scripts.filter(s=>s.title.toLowerCase().includes(search))

let start=(page-1)*perPage
let items=filtered.slice(start,start+perPage)

grid.innerHTML=""

items.forEach(s=>{

grid.innerHTML+=`

<div class="card">

${s.badge ? `<div class="badge">${s.badge}</div>` : ""}

<img src="${s.img}">

<h3>${s.title}</h3>

<a href="script1.html?id=${s.id}">Get Script</a>

</div>

`

})

renderPagination(filtered.length)

}

/* pagination */

function renderPagination(total){

const pages=Math.ceil(total/perPage)

let html=""

for(let i=1;i<=pages;i++){

html+=`<button onclick="goPage(${i})">${i}</button>`

}

document.getElementById("pagination").innerHTML=html

}

function goPage(p){
page=p
render()
}

document.getElementById("search").addEventListener("input",()=>{

page=1
render()

})

render()

/* snow */

const canvas=document.getElementById("snow")
const ctx=canvas.getContext("2d")

let snow=[]

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}

resize()

window.addEventListener("resize",resize)

for(let i=0;i<180;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.beginPath()

snow.forEach(f=>{
ctx.moveTo(f.x,f.y)
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
})

ctx.fill()

snow.forEach(f=>{
f.y+=f.speed

if(f.y>canvas.height){
f.y=0
f.x=Math.random()*canvas.width
}

})

}

setInterval(draw,30)

</script>

</body>
</html>
