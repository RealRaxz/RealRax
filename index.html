<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Christmas Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:#ffffff;
color:#333;
}

/* NAVBAR */

.navbar{
background:#d40000;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 40px;
}

.logo{
font-size:22px;
font-weight:bold;
}

.navbar a{
color:white;
text-decoration:none;
margin-left:20px;
}

/* HERO */

.hero{
background:linear-gradient(#d40000,#ff3b3b);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:40px;
margin:0;
}

.hero p{
margin-top:10px;
}

/* SCRIPT GRID */

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
}

.card h3{
margin:15px;
}

.card button{
background:#d40000;
border:none;
color:white;
padding:10px 20px;
margin:15px;
border-radius:6px;
cursor:pointer;
}

/* PAGINATION */

.pagination{
text-align:center;
margin-top:30px;
}

.pagination button{
padding:10px 15px;
margin:5px;
border:none;
background:#d40000;
color:white;
border-radius:5px;
cursor:pointer;
}

/* SNOW */

.snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(white 2px, transparent 2px),
radial-gradient(white 2px, transparent 2px);
background-size:50px 50px;
animation:snow 10s linear infinite;
opacity:0.4;
}

@keyframes snow{
0%{background-position:0 0,25px 25px;}
100%{background-position:0 500px,25px 525px;}
}

</style>
</head>

<body>

<div class="snow"></div>

<div class="navbar">
<div class="logo">🎄 Christmas Scripts</div>

<div>
<a href="#">Home</a>
<a href="#">Scripts</a>
<a href="#">About</a>
</div>
</div>

<div class="hero">
<h1>Latest Scripts</h1>
<p>Free Roblox Scripts Collection</p>
</div>


<div class="container">

<div id="scripts" class="grid"></div>

<div class="pagination">
<button onclick="page(1)">1</button>
<button onclick="page(2)">2</button>
<button onclick="page(3)">3</button>
</div>

</div>


<script>

const data = [

{title:"Blox Fruits Auto Farm",img:"https://picsum.photos/400/200?1"},
{title:"Blox Fruits Auto Raid",img:"https://picsum.photos/400/200?2"},
{title:"King Legacy Script",img:"https://picsum.photos/400/200?3"},
{title:"Anime Fighters Script",img:"https://picsum.photos/400/200?4"},
{title:"Pet Simulator Script",img:"https://picsum.photos/400/200?5"},
{title:"Doors Script",img:"https://picsum.photos/400/200?6"},
{title:"Blade Ball Script",img:"https://picsum.photos/400/200?7"},
{title:"Adopt Me Script",img:"https://picsum.photos/400/200?8"},
{title:"Arsenal Script",img:"https://picsum.photos/400/200?9"}

];

function page(num){

const container=document.getElementById("scripts");
container.innerHTML="";

let start=(num-1)*3;
let end=start+3;

let items=data.slice(start,end);

items.forEach(script=>{

container.innerHTML+=`
<div class="card">
<img src="${script.img}">
<h3>${script.title}</h3>
<button>Get Script</button>
</div>
`;

});

}

page(1);

</script>

</body>
</html>
