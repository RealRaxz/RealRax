<script>

/* DEFAULT THUMB */

const defaultThumb="https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"

/* DATABASE */

const scripts=[

{title:"Blox Fruits Auto Farm",cat:"blox",thumb:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Blox Fruits Auto Raid",cat:"blox",thumb:"https://img.youtube.com/vi/NxcjNO1i2vw/maxresdefault.jpg"},
{title:"Anime Fighters Script",cat:"anime",thumb:"https://img.youtube.com/vi/-lCf-dBK1cs/maxresdefault.jpg"},
{title:"King Legacy Script",cat:"anime"},
{title:"Pet Simulator Script",cat:"sim"},
{title:"Doors Script",cat:"sim"},

{title:"Blox Fruits Auto Level",cat:"blox"},
{title:"Blox Fruits Auto Quest",cat:"blox"},
{title:"Anime Souls Script",cat:"anime"},
{title:"Anime Warriors Script",cat:"anime"},
{title:"Pet Simulator Auto Farm",cat:"sim"},
{title:"Pet Simulator Dupe",cat:"sim"}

]

scripts.reverse()

/* TRENDING */

let trending=document.getElementById("trending")

scripts.slice(0,3).forEach((s,i)=>{

let thumb=s.thumb || defaultThumb

trending.innerHTML+=`

<div class="card">

<img src="${thumb}">

<h3>${s.title}</h3>

<div class="status">🟢 Working</div>

<button onclick="openPage(${scripts.indexOf(s)+1})">
📜 Get Script
</button>

</div>
`

})

/* PAGINATION */

let perPage=8
let currentPage=1
let filtered=[...scripts]

function render(){

let start=(currentPage-1)*perPage
let end=start+perPage

let pageData=filtered.slice(start,end)

let grid=document.getElementById("scripts")
grid.innerHTML=""

pageData.forEach(s=>{

let thumb=s.thumb || defaultThumb

grid.innerHTML+=`

<div class="card">

<img src="${thumb}">

<h3>${s.title}</h3>

<div class="status">🟢 Working</div>

<button onclick="openPage(${scripts.indexOf(s)+1})">
📜 Get Script
</button>

</div>

`

})

renderPagination()

}

function renderPagination(){

let pages=Math.ceil(filtered.length/perPage)

let html=""

html+=`<button onclick="goPage(1)">«</button>`
html+=`<button onclick="goPage(${currentPage-1})">‹</button>`

let start=Math.max(1,currentPage-3)
let end=Math.min(pages,currentPage+3)

for(let i=start;i<=end;i++){

html+=`<button class="${i==currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`

}

html+=`<button onclick="goPage(${currentPage+1})">›</button>`
html+=`<button onclick="goPage(${pages})">»</button>`

document.getElementById("pagination").innerHTML=html

}

function goPage(p){

let pages=Math.ceil(filtered.length/perPage)

if(p<1)p=1
if(p>pages)p=pages

currentPage=p
render()

}

document.getElementById("search").addEventListener("input",e=>{

let t=e.target.value.toLowerCase()

filtered=scripts.filter(s=>s.title.toLowerCase().includes(t))

currentPage=1

render()

})

function filterCategory(cat){

if(cat=="all"){
filtered=[...scripts]
}else{
filtered=scripts.filter(s=>s.cat==cat)
}

currentPage=1
render()

}

render()

/* HERO SNOW */

const canvas=document.getElementById("snowHero")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=canvas.offsetWidth
canvas.height=canvas.offsetHeight
}

resize()
window.addEventListener("resize",resize)

let snow=[]

for(let i=0;i<120;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

snow.forEach(f=>{

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()

f.y+=f.speed

if(f.y>canvas.height){
f.y=0
f.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

<script>
let step = 0;
let adsOpened = false;
let ytOpened = false;

/* 🔄 update UI */
function updateStatus() {
  document.getElementById("status").innerText = "Action " + step + "/2";
}

/* 🚀 ADS */
document.getElementById("adsBtn").onclick = () => {
  if (adsOpened) return;

  adsOpened = true;
  let start = Date.now();

  window.open("https://airconditionstrodefist.com/zamjdwmm?key=4632b457606c55aeef029a52d64159f6","_blank");

  let check = () => {
    let stay = (Date.now() - start) / 1000;

    if (document.hasFocus() && stay >= 2) {
      step++;
      updateStatus();

      let btn = document.getElementById("adsBtn");
      btn.innerText = "✅ สำเร็จ";
      btn.classList.add("success");

      document.getElementById("ytBtn").classList.remove("lock");

    } else {
      setTimeout(check, 300);
    }
  };
  setTimeout(check, 300);
};

/* ▶️ YOUTUBE */
document.getElementById("ytBtn").onclick = () => {
  if (!adsOpened || ytOpened) return;

  ytOpened = true;
  let start = Date.now();

  window.open("https://youtu.be/-lCf-dBK1cs?si=TzGArF_2bnUPcWKV","_blank");

  let check = () => {
    let stay = (Date.now() - start) / 1000;

    if (document.hasFocus() && stay >= 2) {
      step++;
      updateStatus();

      let btn = document.getElementById("ytBtn");
      btn.innerText = "✅ สำเร็จ";
      btn.classList.add("success");

      startProgress();
    } else {
      setTimeout(check, 300);
    }
  };
  setTimeout(check, 300);
};

/* 🍬 progress */
function startProgress() {
  let box = document.getElementById("progressBox");
  let fill = document.getElementById("fill");
  let text = document.getElementById("cooldownText");

  box.style.display = "block";

  let width = 0;
  let time = 5;

  let bar = setInterval(() => {
    width += 20;
    fill.style.width = width + "%";
  }, 500);

  let cd = setInterval(() => {
    time--;
    text.innerText = "รอ " + time + " วินาที...";

    if (time <= 0) {
      clearInterval(cd);
      clearInterval(bar);

      text.innerText = "พร้อมแล้ว!";
      document.getElementById("enterBtn").style.display = "block";
    }
  }, 1000);
}

/* 🚀 เข้าเว็บ */
document.getElementById("enterBtn").onclick = () => {
  document.getElementById("gateOverlay").remove();
  document.body.style.overflow = "auto";
};

/* init */
updateStatus();
</script>
