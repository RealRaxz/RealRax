<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RealRax Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
background:linear-gradient(135deg,#0f172a,#020617,#1e293b);
}

/* NAVBAR */

.navbar{

position:sticky;
top:0;
z-index:999;

justify-content:space-between;

backdrop-filter:blur(30px);

border:1px solid rgba(255,255,255,0.35);

box-shadow:
0 10px 30px rgba(0,0,0,0.45),
inset 0 1px 1px rgba(255,255,255,0.4);

}

.nav-left{

}

}

.nav-text{

}

.nav-title{

}

.nav-status{

border-radius:14px;

border:1px solid rgba(255,255,255,0.35);

box-shadow:
inset 0 1px 1px rgba(255,255,255,0.4),

transition:0.25s;

}

.nav-btn:hover{

background:rgba(255,255,255,0.16);

}

/* HEADER */

.header{
text-align:center;
padding:40px 20px;
}

.title{
font-size:36px;
font-weight:bold;
color:#38bdf8;
}

/* SEARCH */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{

width:320px;
max-width:90%;

padding:12px;

border-radius:12px;

background:rgba(255,255,255,0.06);

border:1px solid rgba(255,255,255,0.35);

backdrop-filter:blur(20px);

color:white;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:20px;

padding:20px;

max-width:1100px;

margin:auto;

}

/* CARD */

.card-item{
position:relative;
}

.card{

background:rgba(255,255,255,0.05);

backdrop-filter:blur(30px);

border-radius:18px;

border:1px solid rgba(255,255,255,0.35);

box-shadow:
0 12px 30px rgba(0,0,0,0.45),
inset 0 1px 1px rgba(255,255,255,0.5);

overflow:hidden;

cursor:pointer;

transition:0.25s;

}

/* reflection */

.card:before{

content:"";

position:absolute;

top:0;
left:-100%;

width:60%;
height:100%;

background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.3),
transparent
);

transition:0.6s;

}

.card:hover:before{

}

.card:hover{

transform:translateY(-6px) scale(1.02);

box-shadow:
0 18px 40px rgba(0,0,0,0.6);

.pagination{

.page-btn{

background:rgba(255,255,255,0.05);

border:1px solid rgba(255,255,255,0.35);

color:white;

transition:0.25s;

.page-btn:hover{

}

/* PARTICLE BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;

}

@media(max-width:900px){

.grid{

}

</style>

</head>

<body>

<div class="navbar">

<div class="nav-left">

<img src="logo.png" class="nav-logo">

<div class="nav-text">

<div class="nav-title">RealRax</div>

<div class="nav-status">
<span class="status-dot"></span>
ACTIVATE
</div>

</div>

</div>

<div class="nav-right">

<a class="nav-btn">Download</a>
<a class="nav-btn">Purchase</a>
<a class="nav-btn">Discord</a>

</div>

</div>

<canvas id="particles"></canvas>

<div class="header">
<div class="title">🚀 RealRax Script Hub</div>
</div>

<div class="search">
<input id="search" placeholder="🔎 Search Script..." onkeyup="searchScript()">
</div>

<div class="grid" id="grid"></div>

<div class="pagination" id="pagination"></div>

<script>

function searchScript(){

let input=document.getElementById("search").value.toLowerCase();
let cards=document.querySelectorAll(".card-item");

cards.forEach(card=>{

let text=card.innerText.toLowerCase();
card.style.display = text.includes(input) ? "block" : "none";

});

}

/* PARTICLES */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<80;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.4+0.1

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#38bdf8";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y-=p.speed;

if(p.y<0){

p.y=canvas.height;
p.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
