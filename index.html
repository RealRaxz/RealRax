<html lang="th">
<head>

<title>Christmas Scripts</title>

<style>

body{
margin:0;
font-family:Arial;
background:white;
color:#333;
}

.navbar{
background:#d60000;
color:white;
padding:16px 40px;

.grid{
display:grid;

.card{

border-radius:10px;

}

.card img{

}

.card h3{

.card a{

background:#d60000;
color:white;
padding:10px 18px;
margin:15px;
border-radius:6px;
text-decoration:none;
}

/* snow */

#snow{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

</style>

</head>

<body>

<canvas id="snow"></canvas>

<div class="navbar">
🎄 Christmas Scripts

</div>

</div>

</div>

<script>

/* snow fall down */

const canvas=document.getElementById("snow");
const ctx=canvas.getContext("2d");

let snow=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}

resize();
window.addEventListener("resize",resize);

for(let i=0;i<180;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"
ctx.beginPath()

snow.forEach(f=>{
ctx.moveTo(f.x,f.y)
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
})

ctx.fill()

snow.forEach(f=>{
f.y+=f.speed
if(f.y>canvas.height){
f.y=0
f.x=Math.random()*canvas.width
}
})

}

setInterval(draw,30)

</script>

</body>
