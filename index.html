<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
overflow-x:hidden;
}

/* particle */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
pointer-events:none;
}

/* header */

.header{
text-align:center;
padding:40px 20px;
}

.title{
font-size:40px;
font-weight:bold;
color:#38bdf8;
}

/* search */

.search{
text-align:center;
margin-bottom:30px;
}

.search input{

width:320px;
max-width:90%;
padding:12px;
border-radius:8px;
border:1px solid #ffffff;
background:#020617;
color:white;
box-shadow:0 0 8px rgba(255,255,255,0.15);

}

/* grid */

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
max-width:1100px;
margin:auto;

}

/* card */

.card{

background:#0f172a;
border:1px solid #ffffff;
border-radius:14px;
overflow:hidden;
box-shadow:0 0 8px rgba(255,255,255,0.15);
cursor:pointer;
transition:0.2s;

}

.card:hover{

transform:translateY(-4px);
box-shadow:0 0 14px rgba(255,255,255,0.2);

}

.card img{

width:100%;
height:140px;
object-fit:cover;

}

.card-title{

padding:12px;
font-size:15px;
color:#e2e8f0;

}

/* badge */

.badge{

position:absolute;
background:#f59e0b;
color:black;
font-size:12px;
padding:4px 8px;
border-radius:6px;
top:8px;
left:8px;
font-weight:bold;

}

.card-wrap{
position:relative;
}

/* ad */

.ad{

max-width:1000px;
margin:auto;
text-align:center;
padding:20px;

}

/* mobile */

@media(max-width:900px){

.grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:500px){

.grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="header">

<div class="title">🚀 Script Hub</div>

</div>

<div class="search">

<input id="search" placeholder="🔎 Search Script..." onkeyup="searchScript()">

</div>

<div class="ad">

<!-- Adsterra code here -->

</div>

<div class="grid" id="grid">

<!-- CARD 1 -->

<div class="card-wrap">

<div class="badge">⭐ TOP</div>

<div class="card" onclick="openScript('script1')">

<img src="https://picsum.photos/400/200?1">

<div class="card-title">Script #1</div>

</div>

</div>

<!-- CARD 2 -->

<div class="card" onclick="openScript('script2')">

<img src="https://picsum.photos/400/200?2">

<div class="card-title">Script #2</div>

</div>

<div class="card" onclick="openScript('script3')">

<img src="https://picsum.photos/400/200?3">

<div class="card-title">Script #3</div>

</div>

<div class="card" onclick="openScript('script4')">

<img src="https://picsum.photos/400/200?4">

<div class="card-title">Script #4</div>

</div>

<div class="card" onclick="openScript('script5')">

<img src="https://picsum.photos/400/200?5">

<div class="card-title">Script #5</div>

</div>

<div class="card" onclick="openScript('script6')">

<img src="https://picsum.photos/400/200?6">

<div class="card-title">Script #6</div>

</div>

<div class="card" onclick="openScript('script7')">

<img src="https://picsum.photos/400/200?7">

<div class="card-title">Script #7</div>

</div>

<div class="card" onclick="openScript('script8')">

<img src="https://picsum.photos/400/200?8">

<div class="card-title">Script #8</div>

</div>

<div class="card" onclick="openScript('script9')">

<img src="https://picsum.photos/400/200?9">

<div class="card-title">Script #9</div>

</div>

<div class="card" onclick="openScript('script10')">

<img src="https://picsum.photos/400/200?10">

<div class="card-title">Script #10</div>

</div>

</div>

<script>

/* open script */

function openScript(name){

window.location.href="scriptpage.html?script="+name;

}

/* search */

function searchScript(){

let input=document.getElementById("search").value.toLowerCase();

let cards=document.querySelectorAll(".card");

cards.forEach(card=>{

let title=card.innerText.toLowerCase();

if(title.includes(input)){

card.style.display="block";

}else{

card.style.display="none";

}

});

}

/* particle background */

const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

}

resize();
window.addEventListener("resize",resize);

let particles=[];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2+1,
speed:Math.random()*0.6+0.2

});

}

function animate(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#38bdf8";

particles.forEach(p=>{

ctx.beginPath();
ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
ctx.fill();

p.y-=p.speed;

if(p.y<0){

p.y=canvas.height;
p.x=Math.random()*canvas.width;

}

});

requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
