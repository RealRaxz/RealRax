<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Hub</title>

<style>

body{
margin:0;
font-family:Arial;
background:#030712;
color:white;
overflow-x:hidden;
}

/* BLUE PARTICLES */

.particles{

position:fixed;
top:0;
left:0;
width:100%;
height:200%;
z-index:-1;
pointer-events:none;

background-image:

radial-gradient(2px 2px at 2% 10%, #38bdf8, transparent),
radial-gradient(2px 2px at 8% 40%, #38bdf8, transparent),
radial-gradient(2px 2px at 12% 80%, #38bdf8, transparent),
radial-gradient(2px 2px at 18% 25%, #38bdf8, transparent),
radial-gradient(2px 2px at 25% 60%, #38bdf8, transparent),
radial-gradient(2px 2px at 30% 10%, #38bdf8, transparent),
radial-gradient(2px 2px at 35% 90%, #38bdf8, transparent),
radial-gradient(2px 2px at 40% 45%, #38bdf8, transparent),
radial-gradient(2px 2px at 48% 75%, #38bdf8, transparent),
radial-gradient(2px 2px at 55% 15%, #38bdf8, transparent),
radial-gradient(2px 2px at 60% 55%, #38bdf8, transparent),
radial-gradient(2px 2px at 65% 85%, #38bdf8, transparent),
radial-gradient(2px 2px at 70% 35%, #38bdf8, transparent),
radial-gradient(2px 2px at 75% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 82% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 88% 50%, #38bdf8, transparent),
radial-gradient(2px 2px at 92% 90%, #38bdf8, transparent),
radial-gradient(2px 2px at 98% 40%, #38bdf8, transparent);

animation:particlesMove 40s linear infinite;

}

@keyframes particlesMove{
0%{transform:translateY(0);}
100%{transform:translateY(-50%);}
}

/* HEADER */

header{
text-align:center;
padding:25px;
font-size:28px;
font-weight:bold;
color:#38bdf8;
}

/* SEARCH */

.search-box{
text-align:center;
margin-bottom:30px;
}

.search-box input{

width:280px;
padding:10px;
border-radius:6px;
border:none;
background:#0b1220;
color:white;

}

/* GRID */

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;

}

.card{

background:#0b1220;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;

}

.card:hover{
transform:translateY(-8px);
box-shadow:0 0 20px #38bdf8;
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card h3{
padding:10px;
color:#38bdf8;
font-size:16px;
}

/* TOP SCRIPT */

.top{
color:#facc15;
font-size:14px;
padding-left:10px;
}

/* ADSTERNA */

.ad{
margin:30px auto;
text-align:center;
}

</style>
</head>

<body>

<div class="particles"></div>

<header>Script Hub</header>

<div class="container">

<!-- SEARCH -->

<div class="search-box">
<input type="text" id="search" placeholder="Search Script..." onkeyup="searchScript()">
</div>

<!-- ADSTERNA TOP -->

<div class="ad">

<!-- ใส่โค้ดโฆษณา Adsterra ตรงนี้ -->

</div>

<div class="grid" id="scriptGrid">

<!-- TOP SCRIPT -->

<div class="card">
<div class="top">⭐ Top Script</div>
<img src="https://picsum.photos/400/200?1">
<h3>Blox Fruits Auto Farm</h3>
</div>

<!-- SCRIPT LIST -->

<div class="card"><img src="https://picsum.photos/400/200?2"><h3>Script 2</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?3"><h3>Script 3</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?4"><h3>Script 4</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?5"><h3>Script 5</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?6"><h3>Script 6</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?7"><h3>Script 7</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?8"><h3>Script 8</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?9"><h3>Script 9</h3></div>
<div class="card"><img src="https://picsum.photos/400/200?10"><h3>Script 10</h3></div>

</div>

</div>

<script>

/* SEARCH */

function searchScript(){

let input=document.getElementById("search").value.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let text=card.innerText.toLowerCase()

card.style.display=text.includes(input)?"block":"none"

})

}

</script>

</body>
</html>
