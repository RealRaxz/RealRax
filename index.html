<script>

/* DEFAULT THUMB */

const defaultThumb="https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"

/* DATABASE */

const scripts=[

{title:"Blox Fruits Auto Farm",cat:"blox",thumb:"https://img.youtube.com/vi/ueHLbrNRBlI/maxresdefault.jpg"},
{title:"Blox Fruits Auto Raid",cat:"blox",thumb:"https://img.youtube.com/vi/NxcjNO1i2vw/maxresdefault.jpg"},
{title:"Anime Fighters Script",cat:"anime",thumb:"https://img.youtube.com/vi/-lCf-dBK1cs/maxresdefault.jpg"},
{title:"King Legacy Script",cat:"anime"},
{title:"Pet Simulator Script",cat:"sim"},
{title:"Doors Script",cat:"sim"},

{title:"Blox Fruits Auto Level",cat:"blox"},
{title:"Blox Fruits Auto Quest",cat:"blox"},
{title:"Anime Souls Script",cat:"anime"},
{title:"Anime Warriors Script",cat:"anime"},
{title:"Pet Simulator Auto Farm",cat:"sim"},
{title:"Pet Simulator Dupe",cat:"sim"}

]

scripts.reverse()

/* TRENDING */

let trending=document.getElementById("trending")

scripts.slice(0,3).forEach((s,i)=>{

let thumb=s.thumb || defaultThumb

trending.innerHTML+=`

<div class="card">

<img src="${thumb}">

<h3>${s.title}</h3>

<div class="status">🟢 Working</div>

<button onclick="openPage(${scripts.indexOf(s)+1})">
📜 Get Script
</button>

</div>
`

})

/* PAGINATION */

let perPage=8
let currentPage=1
let filtered=[...scripts]

function render(){

let start=(currentPage-1)*perPage
let end=start+perPage

let pageData=filtered.slice(start,end)

let grid=document.getElementById("scripts")
grid.innerHTML=""

pageData.forEach(s=>{

let thumb=s.thumb || defaultThumb

grid.innerHTML+=`

<div class="card">

<img src="${thumb}">

<h3>${s.title}</h3>

<div class="status">🟢 Working</div>

<button onclick="openPage(${scripts.indexOf(s)+1})">
📜 Get Script
</button>

</div>

`

})

renderPagination()

}

function renderPagination(){

let pages=Math.ceil(filtered.length/perPage)

let html=""

html+=`<button onclick="goPage(1)">«</button>`
html+=`<button onclick="goPage(${currentPage-1})">‹</button>`

let start=Math.max(1,currentPage-3)
let end=Math.min(pages,currentPage+3)

for(let i=start;i<=end;i++){

html+=`<button class="${i==currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`

}

html+=`<button onclick="goPage(${currentPage+1})">›</button>`
html+=`<button onclick="goPage(${pages})">»</button>`

document.getElementById("pagination").innerHTML=html

}

function goPage(p){

let pages=Math.ceil(filtered.length/perPage)

if(p<1)p=1
if(p>pages)p=pages

currentPage=p
render()

}

document.getElementById("search").addEventListener("input",e=>{

let t=e.target.value.toLowerCase()

filtered=scripts.filter(s=>s.title.toLowerCase().includes(t))

currentPage=1

render()

})

function filterCategory(cat){

if(cat=="all"){
filtered=[...scripts]
}else{
filtered=scripts.filter(s=>s.cat==cat)
}

currentPage=1
render()

}

render()

/* HERO SNOW */

const canvas=document.getElementById("snowHero")
const ctx=canvas.getContext("2d")

function resize(){
canvas.width=canvas.offsetWidth
canvas.height=canvas.offsetHeight
}

resize()
window.addEventListener("resize",resize)

let snow=[]

for(let i=0;i<120;i++){

snow.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*3+1,
speed:Math.random()*1+0.5
})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="white"

snow.forEach(f=>{

ctx.beginPath()
ctx.arc(f.x,f.y,f.r,0,Math.PI*2)
ctx.fill()

f.y+=f.speed

if(f.y>canvas.height){
f.y=0
f.x=Math.random()*canvas.width
}

})

requestAnimationFrame(draw)

}

draw()

</script>

<style>
:root{--red:#ff2a2a}

/* overlay (เพิ่ม animation) */
#gateOverlay{
  position:fixed;inset:0;
  backdrop-filter:blur(18px);
  background:rgba(0,0,0,.65);
  display:flex;align-items:center;justify-content:center;
  z-index:99999;font-family:system-ui;

  opacity:0;
  transform:scale(1.06);
  transition:opacity .45s ease, transform .45s ease;
}
#gateOverlay.show{
  opacity:1;
  transform:scale(1);
}

/* popup */
#gateBox{
  width:340px;height:322.38px;
  border-radius:22px;
  padding:18px;
  color:#fff;
  position:relative;
  background:#0d0d0d;
  display:flex;flex-direction:column;justify-content:space-between;
  box-shadow:0 25px 80px rgba(0,0,0,.9);
}

/* ✅ FIX มุมแคนดี้ (แก้ซ้ายล่างหายจริง) */
#gateBox::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:22px;
  padding:3px;
  background:repeating-linear-gradient(45deg,red 0 10px,white 10px 20px);

  /* ตัวนี้สำคัญ แก้มุม */
  -webkit-mask:
    radial-gradient(circle at bottom left, transparent 21px, #000 22px),
    linear-gradient(#000 0 0);
  -webkit-mask-composite:destination-over;

  mask:
    radial-gradient(circle at bottom left, transparent 21px, #000 22px),
    linear-gradient(#000 0 0);
  mask-composite:add;

  pointer-events:none;
}

/* sparkle */
#sparkle{position:absolute;inset:0;pointer-events:none}
.star{
  position:absolute;width:3px;height:3px;
  background:white;border-radius:50%;
  animation:sparkle 2s infinite;
}
@keyframes sparkle{
  0%,100%{opacity:0;transform:scale(.5)}
  50%{opacity:1;transform:scale(1.3)}
}

/* layout */
#header{text-align:center}
#title{font-size:15px;font-weight:600}
#sub{font-size:12px;color:#aaa}

#actions{display:flex;flex-direction:column;gap:12px}

.btn{
  height:46px;border-radius:14px;border:none;
  cursor:pointer;font-size:14px;
  position:relative;overflow:hidden;
  transition:.2s;
}
.btn:hover{transform:translateY(-2px)}
.btn:active{transform:scale(.95)}

/* shine */
.btn::before{
  content:"";
  position:absolute;top:0;left:-120%;
  width:60%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.7),transparent);
  transform:skewX(-20deg);
  transition:.6s;
}
.btn:hover::before{left:120%}

.primary{background:var(--red);color:#fff}
.secondary{background:#fff;color:#000}

/* bottom */
#bottom{display:flex;flex-direction:column;gap:10px}
#status{text-align:center;font-size:12px;color:#bbb}

/* progress */
.bar{
  height:12px;
  background:#222;
  border-radius:999px;
  position:relative;
  overflow:hidden;
}

.fill{
  position:absolute;inset:0;
  transform:scaleX(0);
  transform-origin:left;
}

.candy{
  position:absolute;inset:0;
  background:repeating-linear-gradient(45deg,red 0 10px,white 10px 20px);
  animation:move 1s linear infinite;
}

.candy::after{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.5),transparent);
  animation:shine 2s linear infinite;
}

.percent{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:10px;
  color:#fff;
  font-weight:600;
}

@keyframes move{
  from{background-position:0 0}
  to{background-position:40px 0}
}
@keyframes shine{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

/* enter */
#enterBtn{
  height:44px;border-radius:14px;border:none;
  background:#555;color:#aaa;
}
#enterBtn.active{
  background:#000;color:#fff;cursor:pointer;
}
</style>

<div id="gateOverlay">
  <div id="gateBox">

    <div id="sparkle"></div>

    <div id="header">
      <div id="title">🍭 Unlock Content</div>
      <div id="sub">Complete all steps</div>
    </div>

    <div id="actions">
      <button id="btn1" class="btn primary">📺 Watch Ads</button>
      <button id="btn2" class="btn secondary lock">⭐ Complete Step</button>
    </div>

    <div id="bottom">
      <div id="status">0/2 actions completed</div>

      <div class="bar">
        <div id="fill" class="fill">
          <div class="candy"></div>
        </div>
        <div id="percent" class="percent">0%</div>
      </div>

      <button id="enterBtn">🔒 Locked</button>
    </div>

  </div>
</div>

<script>
const b1=document.getElementById("btn1");
const b2=document.getElementById("btn2");
const fill=document.getElementById("fill");
const percent=document.getElementById("percent");
const status=document.getElementById("status");
const enterBtn=document.getElementById("enterBtn");
const sparkle=document.getElementById("sparkle");
const gateOverlay=document.getElementById("gateOverlay");

/* 🎬 smooth enter */
requestAnimationFrame(()=>{
  gateOverlay.classList.add("show");
});

/* sparkle */
for(let i=0;i<20;i++){
  let s=document.createElement("div");
  s.className="star";
  s.style.left=Math.random()*100+"%";
  s.style.top=Math.random()*100+"%";
  s.style.animationDelay=(Math.random()*2)+"s";
  sparkle.appendChild(s);
}

let state={step:0,d1:false,d2:false,busy:false,prog:false};

function update(){
  status.textContent=state.step+"/2 actions completed";
}

function verify(url,cb){
  if(state.busy)return;
  state.busy=true;

  let start=performance.now();
  let left=false;

  function blur(){left=true}
  function focus(){
    let t=performance.now()-start;
    if(left&&t>=2000){
      cleanup();state.busy=false;cb();
    }else{
      start=performance.now();left=false;
    }
  }
  function cleanup(){
    removeEventListener("blur",blur);
    removeEventListener("focus",focus);
  }

  addEventListener("blur",blur);
  addEventListener("focus",focus);
  window.open(url,"_blank");
}

/* step1 */
b1.onclick=()=>{
  if(state.d1)return;
  verify("https://airconditionstrodefist.com",()=>{
    state.d1=true;state.step++;
    b1.classList.add("success");
    b1.textContent="✓ Done";
    b2.classList.remove("lock");
    update();
  });
};

/* step2 */
b2.onclick=()=>{
  if(!state.d1||state.d2)return;
  verify("https://youtu.be",()=>{
    state.d2=true;state.step++;
    b2.classList.add("success");
    b2.textContent="✓ Done";
    update();
    progress();
  });
};

/* progress */
function progress(){
  if(state.prog)return;
  state.prog=true;

  let start=performance.now(),dur=5000;

  function frame(t){
    let p=(t-start)/dur;
    p=Math.min(Math.max(p,0),1);

    fill.style.transform="scaleX("+p+")";
    percent.textContent=Math.floor(p*100)+"%";

    if(p<1){
      requestAnimationFrame(frame);
    }else{
      percent.textContent="100%";
      enterBtn.classList.add("active");
      enterBtn.textContent="Enter Website";
    }
  }

  requestAnimationFrame(frame);
}

enterBtn.onclick=()=>{
  if(!enterBtn.classList.contains("active"))return;
  gateOverlay.remove();
};

update();
</script>
