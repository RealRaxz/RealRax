<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.container{
max-width:850px;
margin:auto;
padding:40px 20px;
}

.card{
background:#0f172a;
border:1px solid #ffffff;
border-radius:16px;
padding:30px;
}

.title{
font-size:28px;
color:#38bdf8;
margin-bottom:15px;
font-weight:bold;
}

textarea{
width:100%;
height:200px;
background:#020617;
border:1px solid #ffffff;
color:#38bdf8;
padding:14px;
border-radius:10px;
font-family:monospace;
resize:none;
}

button{
margin-top:10px;
padding:12px 26px;
background:#0ea5e9;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-weight:bold;
}

.toast{
position:fixed;
bottom:30px;
right:30px;
background:#0ea5e9;
padding:12px 22px;
border-radius:8px;
opacity:0;
transition:0.3s;
}

.toast.show{
opacity:1;
}

</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="title">📜 Copy Script</div>

<textarea id="script" readonly></textarea>

<button onclick="copyScript()">📋 Copy Script</button>

</div>

</div>

<div id="toast" class="toast">✅ Script Copied!</div>

<script>

const scripts={

script1:'loadstring(game:HttpGet("SCRIPT_LINK_1"))()',
script2:'loadstring(game:HttpGet("SCRIPT_LINK_2"))()'

};

const params=new URLSearchParams(window.location.search);
const scriptName=params.get("script");

const box=document.getElementById("script");

if(scriptName && scripts[scriptName]){
box.value=scripts[scriptName];
}else{
box.value="Script not found";
}

function copyScript(){

navigator.clipboard.writeText(box.value);

const toast=document.getElementById("toast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
},2000);

}

</script>

</body>
</html>
