<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:#030712;
color:white;
overflow-x:hidden;
}

/* PARTICLES */

.particles{

position:fixed;
top:0;
left:0;
width:100%;
height:200%;
z-index:-1;

background-image:

radial-gradient(2px 2px at 10% 20%, #38bdf8, transparent),
radial-gradient(2px 2px at 40% 70%, #38bdf8, transparent),
radial-gradient(2px 2px at 60% 30%, #38bdf8, transparent),
radial-gradient(2px 2px at 80% 80%, #38bdf8, transparent),
radial-gradient(2px 2px at 90% 10%, #38bdf8, transparent);

animation:particlesMove 40s linear infinite;

}

@keyframes particlesMove{

0%{transform:translateY(0);}
100%{transform:translateY(-50%);}

}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

textarea{

width:100%;
height:180px;
background:#0b1220;
color:#38bdf8;
border:none;
padding:10px;

}

button{

padding:12px 20px;
margin-top:15px;
background:#0369a1;
border:none;
color:white;
border-radius:6px;
cursor:pointer;

}

button:hover{
background:#0ea5e9;
}

.ad{
margin-top:30px;
text-align:center;
}

</style>
</head>

<body>

<div class="particles"></div>

<div class="container">

<h1>Script</h1>

<textarea id="script">
loadstring(game:HttpGet("https://example.com/script"))()
</textarea>

<br>

<button onclick="copyScript()">Copy Script</button>

<!-- ADSTERNA -->

<div class="ad">

<!-- ใส่โค้ด Adsterra -->

</div>

</div>

<script>

function copyScript(){

let text=document.getElementById("script")

navigator.clipboard.writeText(text.value)

alert("Script Copied")

}

</script>

</body>
</html>
