<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Copy Script</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
}

.container{
max-width:800px;
margin:auto;
padding:40px;
}

textarea{
width:100%;
height:200px;
background:#0f172a;
border:none;
color:#38bdf8;
padding:10px;
}

button{
margin-top:15px;
padding:12px 20px;
background:#0ea5e9;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h2>Copy Script</h2>

<textarea id="script">
loadstring(game:HttpGet("SCRIPT_HERE"))()
</textarea>

<br>

<button onclick="copy()">Copy Script</button>

</div>

<script>

function copy(){

let text=document.getElementById("script").value

navigator.clipboard.writeText(text)

alert("Copied!")

}

</script>

</body>
</html>
