<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Page</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
overflow-x:hidden;
}

/* SAME BACKGROUND */

.bg{

position:fixed;
top:0;
left:0;
width:100%;
height:200%;
z-index:-1;

background-image:url("https://images.unsplash.com/photo-1462331940025-496dfbfc7564");

background-size:cover;
background-repeat:repeat-y;
background-position:center;

animation:bgmove 60s linear infinite;

filter:brightness(0.35);

}

@keyframes bgmove{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-50%);
}

}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

img{
width:100%;
border-radius:10px;
}

h1{
color:#38bdf8;
}

textarea{
width:100%;
height:160px;
background:#0b1220;
color:#38bdf8;
border:none;
padding:10px;
margin-top:15px;
}

button{
padding:12px 20px;
margin-top:12px;
background:#0369a1;
border:none;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<img id="image">

<h1 id="title"></h1>

<p id="description"></p>

<h3>How To Use</h3>
<p id="howto"></p>

<h3>Script</h3>

<textarea id="script"></textarea>

<br>

<button onclick="copyScript()">Copy Script</button>

</div>

<script>

const scripts={

bloxfruit:{
title:"Blox Fruits Auto Farm",
image:"https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png",
description:"Powerful auto farm script.",
howto:"1 Copy Script\n2 Paste in Executor\n3 Execute",
script:'loadstring(game:HttpGet("https://example.com/script"))()'
}

}

const params=new URLSearchParams(location.search)

const name=params.get("script")

const data=scripts[name]

document.getElementById("title").innerText=data.title
document.getElementById("image").src=data.image
document.getElementById("description").innerText=data.description
document.getElementById("howto").innerText=data.howto
document.getElementById("script").value=data.script

function copyScript(){

navigator.clipboard.writeText(data.script)

alert("Script Copied")

}

</script>

</body>
</html>
