<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Script Page</title>

<style>

body{
margin:0;
font-family:Arial;
background:#030712;
color:white;
overflow-x:hidden;
}

/* SAME BACKGROUND */

.bg{
position:fixed;
top:0;
left:0;
width:200%;
height:200%;
z-index:-1;

background:
radial-gradient(circle at 20% 30%, rgba(0,140,255,0.25), transparent 40%),
radial-gradient(circle at 80% 60%, rgba(0,90,255,0.25), transparent 45%),
radial-gradient(circle at 50% 90%, rgba(0,170,255,0.2), transparent 40%);

animation:movebg 60s linear infinite;

filter:blur(40px);
}

@keyframes movebg{

0%{
transform:translateY(0);
}

100%{
transform:translateY(-600px);
}

}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

img{
width:100%;
border-radius:10px;
}

h1{
color:#38bdf8;
}

textarea{

width:100%;
height:160px;
background:#0b1220;
color:#38bdf8;
border:none;
padding:10px;
margin-top:15px;

}

button{

padding:12px 20px;
margin-top:12px;
background:#0369a1;
border:none;
color:white;
border-radius:6px;
cursor:pointer;

}

button:hover{

background:#0ea5e9;

}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<img id="image">

<h1 id="title"></h1>

<p id="description"></p>

<h3>How To Use</h3>

<p id="howto"></p>

<h3>Script</h3>

<textarea id="script"></textarea>

<br>

<button onclick="copyScript()">Copy Script</button>

</div>

<script>

const scripts={

bloxfruit:{
title:"Blox Fruits Auto Farm",
image:"https://tr.rbxcdn.com/7b2c9c0bba8b4c728c59c1e06c2e2d42/768/432/Image/Png",
description:"Powerful auto farm script.",
howto:"1 Copy Script\n2 Paste in Executor\n3 Execute",
script:'loadstring(game:HttpGet("https://example.com/script"))()'
},

esp:{
title:"ESP Player Script",
image:"https://tr.rbxcdn.com/9c9f0fdde9d2c1c3e3cb14d6c2e1dbb6/768/432/Image/Png",
description:"See players through walls.",
howto:"1 Copy Script\n2 Execute",
script:'loadstring(game:HttpGet("https://example.com/esp"))()'
}

}

const params=new URLSearchParams(location.search)

const name=params.get("script")

const data=scripts[name]

document.getElementById("title").innerText=data.title
document.getElementById("image").src=data.image
document.getElementById("description").innerText=data.description
document.getElementById("howto").innerText=data.howto
document.getElementById("script").value=data.script

function copyScript(){

navigator.clipboard.writeText(data.script)

alert("Script Copied")

}

</script>

</body>
</html>
